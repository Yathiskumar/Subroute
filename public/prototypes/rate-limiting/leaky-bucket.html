<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Leaky Bucket — Subroute</title>
    <style>
      :root {
        --bg: #0c0d10; --surface: #14161a; --elevated: #1a1d22;
        --border: #232830; --border-strong: #2d333d;
        --fg: #e8e4dc; --muted: #9099a8; --subtle: #6b7280;
        --accent: #fb863a; --accent-strong: #d56a1f;
        --accent-soft: rgba(251, 134, 58, 0.12); --accent-border: rgba(251, 134, 58, 0.32);
        --success: #5cc66f; --success-soft: rgba(92, 198, 111, 0.12);
        --danger: #f06868; --danger-soft: rgba(240, 104, 104, 0.12);
        --info: #5e9ff6; --info-soft: rgba(94, 159, 246, 0.12);
        --mono: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
        --sans: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
        --radius-md: 8px;
        --color-background-primary: var(--bg);
        --color-background-secondary: var(--surface);
        --color-background-success: var(--success-soft);
        --color-background-danger: var(--danger-soft);
        --color-background-info: var(--info-soft);
        --color-text-primary: var(--fg);
        --color-text-secondary: var(--muted);
        --color-text-success: var(--success);
        --color-text-danger: var(--danger);
        --color-text-info: var(--info);
        --color-border-tertiary: var(--border);
        --border-radius-md: var(--radius-md);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; min-height: 100%; background: var(--bg); color: var(--fg); font-family: var(--sans); }
      body {
        padding: 16px 20px 20px;
        background-image:
          linear-gradient(to right, rgba(255,255,255,0.025) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255,255,255,0.025) 1px, transparent 1px);
        background-size: 40px 40px;
      }
      .ts { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; fill: var(--muted); }
      .th { font-family: var(--sans); font-size: 14px; font-weight: 500; fill: var(--fg); }
      button {
        background: var(--accent); color: #1a1003;
        font: 500 13px/1 var(--sans);
        border: 1px solid transparent; border-radius: var(--radius-md);
        padding: 9px 14px; cursor: pointer;
        transition: filter 150ms ease, transform 100ms ease, background 150ms ease;
      }
      button:hover { filter: brightness(1.06); }
      button:active { transform: scale(0.97); }
      .lb-controls button:nth-of-type(n+2) {
        background: var(--elevated); color: var(--fg); border-color: var(--border);
      }
      .lb-controls button:nth-of-type(n+2):hover { border-color: var(--border-strong); filter: none; background: var(--surface); }
    </style>
    <style>
      .lb-wrap { padding: 0.25rem 0; }
      .lb-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 12px 0; }
      .lb-stat { background: var(--color-background-secondary); padding: 10px 12px; border-radius: var(--border-radius-md); border: 1px solid var(--border); }
      .lb-stat-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-text-secondary); margin-bottom: 4px; }
      .lb-stat-value { font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; }
      .lb-controls { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
      .lb-outcome { padding: 10px 14px; border-radius: var(--border-radius-md); font-size: 13px; min-height: 22px; transition: background 0.15s, color 0.15s; border: 1px solid transparent; }
      .lb-outcome.idle { background: var(--color-background-secondary); color: var(--color-text-secondary); border-color: var(--border); }
      .lb-outcome.allow { background: var(--color-background-success); color: var(--color-text-success); border-color: rgba(92, 198, 111, 0.3); }
      .lb-outcome.deny { background: var(--color-background-danger); color: var(--color-text-danger); border-color: rgba(240, 104, 104, 0.3); }
      #lb-water { transition: y 0.25s, height 0.25s; }
    </style>
  </head>
  <body>
    <div class="lb-wrap">
      <svg width="100%" viewBox="0 0 680 260" role="img" aria-label="Leaky bucket">
        <desc>Incoming requests fill a bucket. The bucket drains at a constant rate. Overflow requests are dropped.</desc>
        <defs>
          <marker id="arrow-lb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </marker>
          <clipPath id="lb-clip">
            <path d="M 250 80 L 260 215 L 360 215 L 370 80 Z"/>
          </clipPath>
        </defs>
        <text class="ts" x="130" y="100" text-anchor="middle">INCOMING</text>
        <text class="ts" x="130" y="118" text-anchor="middle">REQUESTS</text>
        <line x1="180" y1="140" x2="240" y2="140" stroke="var(--color-text-secondary)" stroke-width="1.5" marker-end="url(#arrow-lb)"/>
        <g id="lb-drops-in"></g>
        <rect id="lb-water" x="250" y="215" width="120" height="0" fill="#fb863a" opacity="0.65" clip-path="url(#lb-clip)"/>
        <path d="M 250 80 L 260 215 L 360 215 L 370 80" fill="none" stroke="var(--color-text-primary)" stroke-width="2" stroke-linejoin="round"/>
        <line x1="250" y1="80" x2="370" y2="80" stroke="var(--color-text-primary)" stroke-width="1" stroke-dasharray="3 3" opacity="0.35"/>
        <circle cx="310" cy="217" r="3" fill="var(--color-background-primary)"/>
        <text class="ts" x="310" y="245" text-anchor="middle">CAPACITY = 10 · LEAK 1/SEC</text>
        <g id="lb-drops-out"></g>
        <line x1="430" y1="140" x2="500" y2="140" stroke="var(--color-text-secondary)" stroke-width="1.5" marker-end="url(#arrow-lb)"/>
        <text class="ts" x="465" y="130" text-anchor="middle">PROCESSED</text>
        <rect x="520" y="115" width="120" height="60" rx="8" fill="var(--color-background-secondary)" stroke="var(--color-border-tertiary)" stroke-width="1"/>
        <text id="lb-out-text" class="th" x="580" y="150" text-anchor="middle">Ready</text>
      </svg>
      <div class="lb-stats">
        <div class="lb-stat"><div class="lb-stat-label">Queue</div><div class="lb-stat-value" id="lb-count">0</div></div>
        <div class="lb-stat"><div class="lb-stat-label">Leak rate</div><div class="lb-stat-value">1/s</div></div>
        <div class="lb-stat"><div class="lb-stat-label">Processed</div><div class="lb-stat-value" id="lb-processed">0</div></div>
        <div class="lb-stat"><div class="lb-stat-label">Dropped</div><div class="lb-stat-value" id="lb-dropped">0</div></div>
      </div>
      <div class="lb-controls">
        <button onclick="lbSend()">Send request</button>
        <button onclick="lbBurst()">Burst of 15</button>
        <button onclick="lbReset()">Reset</button>
      </div>
      <div class="lb-outcome idle" id="lb-outcome">Click "send request" to add to the queue</div>
    </div>
    <script>
      let lbQueue = 0;
      const lbMax = 10;
      let lbProcessed = 0, lbDropped = 0;
      function lbRender() {
        document.getElementById('lb-count').textContent = lbQueue;
        const fillHeight = (lbQueue / lbMax) * 135;
        const w = document.getElementById('lb-water');
        w.setAttribute('y', 215 - fillHeight);
        w.setAttribute('height', fillHeight);
      }
      function lbDripIn() {
        const g = document.getElementById('lb-drops-in');
        const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        c.setAttribute('cx', 310); c.setAttribute('cy', 50);
        c.setAttribute('r', 5); c.setAttribute('fill', '#fb863a');
        g.appendChild(c);
        let cy = 50;
        const id = setInterval(() => {
          cy += 6; c.setAttribute('cy', cy);
          if (cy > 80) { c.remove(); clearInterval(id); }
        }, 25);
      }
      function lbDripOut() {
        const g = document.getElementById('lb-drops-out');
        const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        c.setAttribute('cx', 310); c.setAttribute('cy', 220);
        c.setAttribute('r', 4); c.setAttribute('fill', '#fb863a');
        g.appendChild(c);
        let cy = 220;
        const id = setInterval(() => {
          cy += 5; c.setAttribute('cy', cy);
          if (cy > 250) { c.remove(); clearInterval(id); }
        }, 30);
      }
      function lbSend() {
        const o = document.getElementById('lb-outcome');
        const t = document.getElementById('lb-out-text');
        if (lbQueue < lbMax) {
          lbQueue++;
          o.className = 'lb-outcome allow';
          o.textContent = '✓ Request queued — will be processed at fixed rate';
          t.textContent = 'Queued';
          lbDripIn();
        } else {
          lbDropped++;
          o.className = 'lb-outcome deny';
          o.textContent = '✗ Request dropped — bucket overflowed';
          t.textContent = 'Dropped';
        }
        document.getElementById('lb-dropped').textContent = lbDropped;
        lbRender();
      }
      function lbBurst() { for (let i = 0; i < 15; i++) setTimeout(lbSend, i * 70); }
      function lbReset() {
        lbQueue = 0; lbProcessed = 0; lbDropped = 0;
        document.getElementById('lb-processed').textContent = 0;
        document.getElementById('lb-dropped').textContent = 0;
        const o = document.getElementById('lb-outcome');
        o.className = 'lb-outcome idle';
        o.textContent = 'Click "send request" to add to the queue';
        document.getElementById('lb-out-text').textContent = 'Ready';
        lbRender();
      }
      setInterval(() => {
        if (lbQueue > 0) {
          lbQueue--; lbProcessed++;
          document.getElementById('lb-processed').textContent = lbProcessed;
          lbRender();
          lbDripOut();
        }
      }, 1000);
      lbRender();
    </script>
    <script>(function(){function p(){var h=Math.max(document.documentElement.scrollHeight,document.body.scrollHeight);parent.postMessage({type:"prototype:height",height:h},"*");}if(window.ResizeObserver)new ResizeObserver(p).observe(document.body);window.addEventListener("load",p);})();</script>
  </body>
</html>
