<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Strategy — Subroute</title>
    <style>
      :root {
        --bg: #0c0d10;
        --surface: #14161a;
        --elevated: #1a1d22;
        --border: #232830;
        --border-strong: #2d333d;
        --fg: #e8e4dc;
        --muted: #9099a8;
        --subtle: #6b7280;
        --accent: #fb863a;
        --accent-soft: rgba(251, 134, 58, 0.12);
        --accent-border: rgba(251, 134, 58, 0.45);
        --success: #5cc66f;
        --success-soft: rgba(92, 198, 111, 0.12);
        --info: #5e9ff6;
        --info-soft: rgba(94, 159, 246, 0.12);
        --danger: #f06868;
        --danger-soft: rgba(240, 104, 104, 0.12);
        --bike: #a78bfa;
        --bike-soft: rgba(167, 139, 250, 0.12);
        --mono: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
        --sans: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
        --r-md: 8px;
        --r-lg: 12px;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: var(--sans); }
      body {
        padding: 16px 18px 22px;
        background-image:
          linear-gradient(to right, rgba(255,255,255,0.022) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255,255,255,0.022) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      /* ---- Top: strategy chips + reset ---- */
      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
      .chips { display: inline-flex; background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 3px; gap: 2px; }
      .chip { font: 700 12px/1 var(--sans); border: 0; background: transparent; color: var(--muted); padding: 8px 15px; border-radius: 999px; cursor: pointer; transition: color .15s, background .15s, box-shadow .15s; white-space: nowrap; }
      .chip:hover { color: var(--fg); }
      .chip.on { background: var(--accent-soft); color: var(--accent); box-shadow: 0 0 0 1px var(--accent-border), 0 0 12px rgba(251,134,58,0.25); }
      .btn { background: var(--elevated); color: var(--fg); font: 600 12px/1 var(--sans); border: 1px solid var(--border); border-radius: var(--r-md); padding: 9px 14px; cursor: pointer; transition: border-color .15s, transform .1s; }
      .btn:hover { border-color: var(--border-strong); }
      .btn:active { transform: scale(0.97); }

      /* ---- Action row: route() + context card + result ---- */
      .actions { display: flex; gap: 9px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
      .act { font-family: var(--mono); font-size: 12px; font-weight: 700; background: var(--accent-soft); border: 1px solid var(--accent-border); border-radius: var(--r-md); padding: 10px 14px; cursor: pointer; color: var(--accent); transition: border-color .15s, transform .1s; }
      .act:hover { border-color: var(--accent); }
      .act:active { transform: scale(0.97); }
      .ctx { display: inline-flex; align-items: center; gap: 8px; background: var(--elevated); border: 1px solid var(--border-strong); border-radius: var(--r-md); padding: 9px 12px; }
      .ctx code { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--fg); }
      .ctx .tag { font-family: var(--mono); font-size: 9px; letter-spacing: .03em; background: var(--success-soft); color: var(--success); border-radius: 4px; padding: 3px 6px; white-space: nowrap; }
      .result { margin-left: auto; font-family: var(--mono); font-size: 11.5px; font-weight: 700; border: 1px solid var(--border); border-radius: 999px; padding: 7px 12px; color: var(--subtle); background: var(--surface); white-space: nowrap; }
      .result.drive { color: var(--info); border-color: rgba(94,159,246,.45); background: var(--info-soft); }
      .result.bike { color: var(--bike); border-color: rgba(167,139,250,.45); background: var(--bike-soft); }
      .result.walk { color: var(--success); border-color: rgba(92,198,111,.45); background: var(--success-soft); }

      /* ---- Stage: the map ---- */
      .stage { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 14px; margin-bottom: 14px; }
      .stage-cap { font-family: var(--mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; display: flex; justify-content: space-between; gap: 10px; }
      .stage-cap b { color: var(--fg); }

      /* ---- Fixed explain panel (replaced, never grows) ---- */
      .explain { min-height: 72px; background: #0a0b0e; border: 1px solid var(--border); border-radius: var(--r-md); padding: 13px 15px; display: flex; align-items: center; }
      .explain-body { font-size: 13px; line-height: 1.6; color: var(--fg); }
      .explain-body code { font-family: var(--mono); background: var(--elevated); color: var(--fg); padding: 1px 5px; border-radius: 4px; font-size: 11.5px; }
      .explain-body .dim { color: var(--muted); }
      .explain-body .drive { color: var(--info); font-weight: 700; }
      .explain-body .bike { color: var(--bike); font-weight: 700; }
      .explain-body .walk { color: var(--success); font-weight: 700; }

      .hint { margin-top: 14px; font-size: 12px; color: var(--muted); display: flex; gap: 7px; align-items: flex-start; }
      .hint .b { color: var(--accent); }
    </style>
  </head>
  <body>
    <!-- TOP: strategy chips -->
    <div class="topbar">
      <div class="chips" id="chips">
        <button class="chip on" id="chip-drive" onclick="pick('drive')">🚗 Drive</button>
        <button class="chip" id="chip-bike" onclick="pick('bike')">🚴 Bike</button>
        <button class="chip" id="chip-walk" onclick="pick('walk')">🚶 Walk</button>
      </div>
      <button class="btn" onclick="reset()">↺ Reset</button>
    </div>

    <!-- ACTIONS: the one call that never changes -->
    <div class="actions">
      <button class="act" id="route-btn" onclick="run()">▶ route()</button>
      <span class="ctx"><code>map.route(A → B)</code><span class="tag">client code: unchanged</span></span>
      <span class="result" id="result">no route yet</span>
    </div>

    <!-- STAGE -->
    <div class="stage">
      <div class="stage-cap">
        <span>City map · A → B</span>
        <span>strategy held: <b id="held">DriveStrategy</b></span>
      </div>
      <svg viewBox="0 0 560 280" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block;border-radius:8px" role="img" aria-label="City map with route from A to B">
        <rect x="0" y="0" width="560" height="280" rx="8" fill="#101216" />
        <!-- city grid -->
        <g stroke="#1c2028" stroke-width="1">
          <line x1="40" y1="0" x2="40" y2="280" />
          <line x1="80" y1="0" x2="80" y2="280" />
          <line x1="120" y1="0" x2="120" y2="280" />
          <line x1="160" y1="0" x2="160" y2="280" />
          <line x1="200" y1="0" x2="200" y2="280" />
          <line x1="240" y1="0" x2="240" y2="280" />
          <line x1="280" y1="0" x2="280" y2="280" />
          <line x1="320" y1="0" x2="320" y2="280" />
          <line x1="360" y1="0" x2="360" y2="280" />
          <line x1="400" y1="0" x2="400" y2="280" />
          <line x1="440" y1="0" x2="440" y2="280" />
          <line x1="480" y1="0" x2="480" y2="280" />
          <line x1="520" y1="0" x2="520" y2="280" />
          <line x1="0" y1="40" x2="560" y2="40" />
          <line x1="0" y1="80" x2="560" y2="80" />
          <line x1="0" y1="120" x2="560" y2="120" />
          <line x1="0" y1="160" x2="560" y2="160" />
          <line x1="0" y1="200" x2="560" y2="200" />
          <line x1="0" y1="240" x2="560" y2="240" />
        </g>
        <!-- city blocks -->
        <g fill="#161a20">
          <rect x="90" y="46" width="70" height="46" rx="3" />
          <rect x="380" y="140" width="76" height="52" rx="3" />
          <rect x="248" y="238" width="86" height="30" rx="3" />
          <rect x="424" y="212" width="58" height="34" rx="3" />
          <rect x="46" y="126" width="54" height="46" rx="3" />
        </g>
        <!-- river -->
        <path d="M -10 244 C 60 224, 105 160, 165 118 C 235 68, 340 48, 570 40" fill="none" stroke="#1d3a55" stroke-width="13" stroke-linecap="round" />
        <path d="M -10 244 C 60 224, 105 160, 165 118 C 235 68, 340 48, 570 40" fill="none" stroke="#24506f" stroke-width="5" stroke-linecap="round" opacity="0.7" />
        <text x="452" y="30" fill="#3f6f92" font-family="ui-monospace, Menlo, monospace" font-size="9" letter-spacing="0.08em">RIVER</text>
        <!-- park -->
        <rect x="200" y="110" width="150" height="110" rx="6" fill="#16281c" stroke="#20402a" stroke-width="1.5" />
        <text x="210" y="212" fill="#3d6b4b" font-family="ui-monospace, Menlo, monospace" font-size="9" letter-spacing="0.08em">PARK</text>
        <!-- highway ring -->
        <rect x="30" y="18" width="500" height="244" rx="28" fill="none" stroke="#2b323c" stroke-width="7" />
        <rect x="30" y="18" width="500" height="244" rx="28" fill="none" stroke="#3a424e" stroke-width="1" stroke-dasharray="6 8" />
        <text x="238" y="266" fill="#59616e" font-family="ui-monospace, Menlo, monospace" font-size="9" letter-spacing="0.08em">HIGHWAY</text>
        <!-- the one route path, drawn by the active strategy -->
        <path id="route-path" d="" fill="none" stroke="#5e9ff6" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
        <!-- pins -->
        <g>
          <circle cx="70" cy="232" r="11" fill="#0c0d10" stroke="#e8e4dc" stroke-width="2" />
          <text x="70" y="236" fill="#e8e4dc" font-family="ui-monospace, Menlo, monospace" font-size="11" font-weight="700" text-anchor="middle">A</text>
          <circle cx="494" cy="52" r="11" fill="#0c0d10" stroke="#fb863a" stroke-width="2" />
          <text x="494" y="56" fill="#fb863a" font-family="ui-monospace, Menlo, monospace" font-size="11" font-weight="700" text-anchor="middle">B</text>
        </g>
      </svg>
    </div>

    <!-- FIXED EXPLAIN PANEL -->
    <div class="explain">
      <div class="explain-body" id="ex-body">Pick a strategy chip, then press <code>▶ route()</code>.</div>
    </div>

    <div class="hint">
      <span class="b">▸</span>
      <span>The mono card never changes — only the object behind it does.</span>
    </div>

    <script>
      /* ---- the family of interchangeable algorithms ---- */
      var STRATEGIES = {
        drive: {
          name: "DriveStrategy",
          color: "#5e9ff6",
          result: "🚗 12 min · 8.4 km",
          d: "M 70 232 L 70 262 L 502 262 A 28 28 0 0 0 530 234 L 530 100 L 494 52",
          line: 'Same call — <span class="drive">DriveStrategy</span> picked the highway ring.'
        },
        bike: {
          name: "BikeStrategy",
          color: "#a78bfa",
          result: "🚴 26 min · 6.1 km",
          d: "M 70 232 C 60 192, 96 150, 150 118 C 216 78, 322 62, 420 58 L 494 52",
          line: 'Same call — <span class="bike">BikeStrategy</span> followed the riverside lanes.'
        },
        walk: {
          name: "WalkStrategy",
          color: "#5cc66f",
          result: "🚶 58 min · 4.7 km",
          d: "M 70 232 L 158 198 L 282 126 L 384 94 L 494 52",
          line: 'Same call — <span class="walk">WalkStrategy</span> cut straight through the park.'
        }
      };

      var current = "drive";   // the ONE strategy the context holds
      var timer = null;

      /* ---- one explain panel, REPLACED (never appended) ---- */
      function setExplain(html) {
        document.getElementById("ex-body").innerHTML = html;
      }

      /* ---- client picks the strategy from outside ---- */
      function pick(key) {
        current = key;
        renderChips();
        setExplain('Context now holds <b>' + STRATEGIES[key].name + '</b> — press <code>▶ route()</code>.');
      }

      function renderChips() {
        ["drive", "bike", "walk"].forEach(function (k) {
          document.getElementById("chip-" + k).className = "chip" + (k === current ? " on" : "");
        });
        document.getElementById("held").textContent = STRATEGIES[current].name;
      }

      /* ---- the context delegates: one polymorphic call, no if/else ---- */
      function run() {
        var s = STRATEGIES[current];
        drawPath(s.d, s.color);

        var res = document.getElementById("result");
        res.className = "result " + current;
        res.textContent = s.result;

        setExplain(s.line);
      }

      /* ---- draw/replace the single visible path ---- */
      function drawPath(d, color) {
        if (timer) { clearTimeout(timer); timer = null; }
        var p = document.getElementById("route-path");
        p.setAttribute("d", d);
        p.setAttribute("stroke", color);
        if (!d) {
          p.setAttribute("style", "transition:none;");
          return;
        }
        var len = Math.ceil(p.getTotalLength());
        p.setAttribute("style", "transition:none;stroke-dasharray:" + len + ";stroke-dashoffset:" + len + ";");
        timer = setTimeout(function () {
          timer = null;
          p.setAttribute("style", "transition:stroke-dashoffset 1.15s cubic-bezier(.4,0,.2,1);stroke-dasharray:" + len + ";stroke-dashoffset:0;");
        }, 24);
      }

      /* ---- reset clears the map, but the context keeps its strategy ---- */
      function reset() {
        drawPath("", STRATEGIES[current].color);
        var res = document.getElementById("result");
        res.className = "result";
        res.textContent = "no route yet";
        setExplain('Map cleared — the context still holds <b>' + STRATEGIES[current].name + '</b>.');
      }

      /* ---- boot ---- */
      renderChips();
    </script>
    <script>(function(){function p(){var h=Math.ceil(Math.max(document.body.scrollHeight,document.body.getBoundingClientRect().height));parent.postMessage({type:"prototype:height",height:h},"*");}if(window.ResizeObserver)new ResizeObserver(p).observe(document.body);window.addEventListener("load",p);})();</script>
  </body>
</html>
