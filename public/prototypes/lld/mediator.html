<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mediator — Subroute</title>
    <style>
      :root {
        --bg: #0c0d10;
        --surface: #14161a;
        --elevated: #1a1d22;
        --border: #232830;
        --border-strong: #2d333d;
        --fg: #e8e4dc;
        --muted: #9099a8;
        --subtle: #6b7280;
        --accent: #fb863a;
        --accent-soft: rgba(251, 134, 58, 0.12);
        --accent-border: rgba(251, 134, 58, 0.45);
        --success: #5cc66f;
        --success-soft: rgba(92, 198, 111, 0.12);
        --info: #5e9ff6;
        --info-soft: rgba(94, 159, 246, 0.12);
        --danger: #f06868;
        --danger-soft: rgba(240, 104, 104, 0.12);
        --mono: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
        --sans: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
        --r-md: 8px;
        --r-lg: 12px;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: var(--sans); }
      body {
        padding: 16px 18px 22px;
        background-image:
          linear-gradient(to right, rgba(255,255,255,0.022) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255,255,255,0.022) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      /* ---- Top: world toggle + reset ---- */
      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
      .toggle { display: inline-flex; background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 3px; }
      .toggle button { font: 700 12px/1 var(--sans); border: 0; background: transparent; color: var(--muted); padding: 8px 15px; border-radius: 999px; cursor: pointer; transition: color .15s, background .15s; white-space: nowrap; }
      .toggle button.on.without { background: var(--danger-soft); color: var(--danger); }
      .toggle button.on.with { background: var(--success-soft); color: var(--success); }
      .btn { background: var(--elevated); color: var(--fg); font: 600 12px/1 var(--sans); border: 1px solid var(--border); border-radius: var(--r-md); padding: 9px 14px; cursor: pointer; transition: border-color .15s, transform .1s; }
      .btn:hover { border-color: var(--border-strong); }
      .btn:active { transform: scale(0.97); }

      /* ---- Action row ---- */
      .actions { display: flex; gap: 9px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
      .act { font-family: var(--mono); font-size: 12px; font-weight: 700; background: var(--elevated); border: 1px solid var(--border-strong); border-radius: var(--r-md); padding: 10px 14px; cursor: pointer; color: var(--fg); transition: border-color .15s, transform .1s; }
      .act.prime { background: var(--accent-soft); border-color: var(--accent-border); color: var(--accent); }
      .act:hover { border-color: var(--accent); }
      .act:active { transform: scale(0.97); }
      .act:disabled { opacity: .4; cursor: not-allowed; }
      .chip { margin-left: auto; font-family: var(--mono); font-size: 12px; font-weight: 700; border-radius: 999px; padding: 8px 14px; border: 1px solid var(--border-strong); transition: color .2s, background .2s, border-color .2s; }
      .chip.bad { background: var(--danger-soft); border-color: rgba(240,104,104,.4); color: var(--danger); }
      .chip.good { background: var(--success-soft); border-color: rgba(92,198,111,.4); color: var(--success); }

      /* ---- Stage ---- */
      .stage { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 8px 10px 4px; margin-bottom: 14px; }
      .stage svg { display: block; width: 100%; height: auto; }
      .node { cursor: pointer; }
      .node circle.av { fill: var(--elevated); stroke: var(--border-strong); stroke-width: 1.5; transition: stroke .15s, fill .15s; }
      .node:hover circle.av { stroke: var(--info); }
      .node.hit circle.av { stroke: var(--accent); stroke-width: 2.5; fill: rgba(251,134,58,.16); }
      .node text { pointer-events: none; }
      .nlabel { fill: var(--muted); font: 700 12px var(--sans); }
      .hub circle.av { fill: var(--success-soft); stroke: var(--success); stroke-width: 1.6; }
      .hub.hit circle.av { stroke: var(--accent); stroke-width: 3; fill: rgba(251,134,58,.16); }
      .hub .nlabel { fill: var(--success); font: 700 11px var(--mono); }
      .link { fill: none; }
      .link.mesh { stroke: var(--danger); opacity: .42; stroke-width: 1.5; }
      .link.hubline { stroke: var(--success); opacity: .55; stroke-width: 1.7; }
      .link.flash { animation: lineflash .95s ease; }
      @keyframes lineflash { 0% { opacity: 1; stroke-width: 4; } 100% { opacity: .5; stroke-width: 1.6; } }
      .pulse.bad { fill: var(--danger); }
      .pulse.out { fill: var(--accent); }
      .pulse.good { fill: var(--success); }

      /* ---- Fixed explain panel (replaced, never grows) ---- */
      .explain { min-height: 72px; background: #0a0b0e; border: 1px solid var(--border); border-radius: var(--r-md); padding: 13px 15px; display: flex; flex-direction: column; justify-content: center; }
      .explain-title { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 5px; }
      .explain-body { font-size: 13px; line-height: 1.6; color: var(--fg); }
      .explain-body code { font-family: var(--mono); background: var(--elevated); color: var(--fg); padding: 1px 5px; border-radius: 4px; font-size: 11.5px; }
      .explain-body .dim { color: var(--muted); }
      .explain-body .good { color: var(--success); font-weight: 700; }
      .explain-body .bad { color: var(--danger); font-weight: 700; }

      .hint { margin-top: 14px; font-size: 12px; color: var(--muted); display: flex; gap: 7px; align-items: flex-start; }
      .hint .b { color: var(--accent); }
    </style>
  </head>
  <body>
    <!-- TOP: world toggle -->
    <div class="topbar">
      <div class="toggle" id="toggle">
        <button class="without on" id="tg-without" onclick="setWorld('without')">✕ WITHOUT Mediator</button>
        <button class="with" id="tg-with" onclick="setWorld('with')">✓ WITH Mediator</button>
      </div>
      <button class="btn" onclick="reset()">↺ Reset</button>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <button class="act prime" id="add-btn" onclick="addUser()">＋ Add user</button>
      <span class="chip bad" id="conn-chip">connections: <b id="conn-n">6</b></span>
    </div>

    <!-- STAGE -->
    <div class="stage">
      <svg id="stage" viewBox="0 0 640 396" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Users connected either pairwise or through a ChatRoom hub">
        <g id="links"></g>
        <g id="pulses"></g>
        <g id="nodes"></g>
      </svg>
    </div>

    <!-- FIXED EXPLAIN PANEL -->
    <div class="explain">
      <div class="explain-title" id="ex-title">Everyone knows everyone</div>
      <div class="explain-body" id="ex-body">4 users, <span class="bad">6</span> direct links — click an avatar to send a message.</div>
    </div>

    <div class="hint">
      <span class="b">▸</span>
      <span>The chip is the lesson: <b style="color:var(--danger)">n(n−1)/2</b> links without a hub, just <b style="color:var(--success)">n</b> with one.</span>
    </div>

    <script>
      /* ---- one explain panel, REPLACED (never appended) ---- */
      function setExplain(title, bodyHtml) {
        document.getElementById("ex-title").textContent = title;
        document.getElementById("ex-body").innerHTML = bodyHtml;
      }

      var SVGNS = "http://www.w3.org/2000/svg";
      var CX = 320, CY = 204, RX = 182, RY = 124;

      var BASE = [
        { name: "Ana",   emoji: "🧑", ang: -135 },
        { name: "Ben",   emoji: "👨", ang: -45  },
        { name: "Chloe", emoji: "👩", ang: 45   },
        { name: "Dan",   emoji: "🧔", ang: 135  },
      ];
      var EVE = { name: "Eve", emoji: "👧", ang: -90 };

      var world = "without";      // "without" | "with"
      var users = BASE.slice();
      var gen = 0;                // generation token: bumped on re-render to cancel in-flight pulses
      var nodeEls = [];           // avatar <g> elements, index-aligned with users
      var hubEl = null;           // the ChatRoom hub <g> (WITH world only)

      function pos(u) {
        var a = u.ang * Math.PI / 180;
        return { x: CX + RX * Math.cos(a), y: CY + RY * Math.sin(a) };
      }
      function hubPos() { return { x: CX, y: CY }; }

      function connections() {
        return world === "with" ? users.length : users.length * (users.length - 1) / 2;
      }

      function svgEl(tag, attrs) {
        var e = document.createElementNS(SVGNS, tag);
        for (var k in attrs) e.setAttribute(k, attrs[k]);
        return e;
      }

      /* deterministic control point so mesh lines look slightly tangled */
      function meshCtrl(i, j, p1, p2) {
        var lo = Math.min(i, j), hi = Math.max(i, j);
        var off = (((lo * 7 + hi * 13) % 3) - 1) * 26;
        var mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
        var dx = p2.x - p1.x, dy = p2.y - p1.y;
        var len = Math.sqrt(dx * dx + dy * dy) || 1;
        return { x: mx - (dy / len) * off, y: my + (dx / len) * off };
      }

      /* ---- render the whole scene (links + nodes) ---- */
      function render(flashNew) {
        gen++;
        var links = document.getElementById("links");
        var pulses = document.getElementById("pulses");
        var nodes = document.getElementById("nodes");
        links.innerHTML = "";
        pulses.innerHTML = "";
        nodes.innerHTML = "";
        nodeEls = [];
        hubEl = null;

        var lastIdx = users.length - 1;

        if (world === "without") {
          for (var i = 0; i < users.length; i++) {
            for (var j = i + 1; j < users.length; j++) {
              var p1 = pos(users[i]), p2 = pos(users[j]);
              var c = meshCtrl(i, j, p1, p2);
              var isNew = flashNew && (i === lastIdx || j === lastIdx);
              var path = svgEl("path", {
                d: "M" + p1.x.toFixed(1) + " " + p1.y.toFixed(1) +
                   " Q" + c.x.toFixed(1) + " " + c.y.toFixed(1) +
                   " " + p2.x.toFixed(1) + " " + p2.y.toFixed(1),
                "class": "link mesh" + (isNew ? " flash" : ""),
              });
              links.appendChild(path);
            }
          }
        } else {
          var h = hubPos();
          for (var k = 0; k < users.length; k++) {
            var p = pos(users[k]);
            var isNewLine = flashNew && k === lastIdx;
            var line = svgEl("line", {
              x1: p.x.toFixed(1), y1: p.y.toFixed(1),
              x2: h.x.toFixed(1), y2: h.y.toFixed(1),
              "class": "link hubline" + (isNewLine ? " flash" : ""),
            });
            links.appendChild(line);
          }
          hubEl = svgEl("g", { "class": "hub" });
          hubEl.appendChild(svgEl("circle", { "class": "av", cx: h.x, cy: h.y, r: 32 }));
          var hIco = svgEl("text", { x: h.x, y: h.y + 8, "text-anchor": "middle", "font-size": "24" });
          hIco.textContent = "💬";
          hubEl.appendChild(hIco);
          var hLbl = svgEl("text", { "class": "nlabel", x: h.x, y: h.y + 52, "text-anchor": "middle" });
          hLbl.textContent = "ChatRoom";
          hubEl.appendChild(hLbl);
          nodes.appendChild(hubEl);
        }

        users.forEach(function (u, idx) {
          var p = pos(u);
          var g = svgEl("g", { "class": "node" });
          g.appendChild(svgEl("circle", { "class": "av", cx: p.x, cy: p.y, r: 27 }));
          var ico = svgEl("text", { x: p.x, y: p.y + 8, "text-anchor": "middle", "font-size": "23" });
          ico.textContent = u.emoji;
          g.appendChild(ico);
          var lbl = svgEl("text", { "class": "nlabel", x: p.x, y: p.y + 46, "text-anchor": "middle" });
          lbl.textContent = u.name;
          g.appendChild(lbl);
          g.onclick = (function (i2) { return function () { clickUser(i2); }; })(idx);
          nodes.appendChild(g);
          nodeEls.push(g);
        });

        // chip + toggle + add button
        document.getElementById("conn-n").textContent = connections();
        document.getElementById("conn-chip").className = "chip " + (world === "with" ? "good" : "bad");
        document.getElementById("tg-without").className = "without" + (world === "without" ? " on" : "");
        document.getElementById("tg-with").className = "with" + (world === "with" ? " on" : "");
        document.getElementById("add-btn").disabled = users.length >= 5;
      }

      /* ---- pulse travelling along a quadratic curve (straight if ctrl = midpoint) ---- */
      function pulseAlong(p1, ctrl, p2, cls, done) {
        var myGen = gen;
        var host = document.getElementById("pulses");
        var c = svgEl("circle", { "class": "pulse " + cls, r: 6, cx: p1.x, cy: p1.y });
        host.appendChild(c);
        var steps = 14, i = 0;
        function step() {
          if (myGen !== gen) { if (c.parentNode) c.parentNode.removeChild(c); return; }
          i++;
          var t = i / steps, mt = 1 - t;
          var x = mt * mt * p1.x + 2 * mt * t * ctrl.x + t * t * p2.x;
          var y = mt * mt * p1.y + 2 * mt * t * ctrl.y + t * t * p2.y;
          c.setAttribute("cx", x.toFixed(1));
          c.setAttribute("cy", y.toFixed(1));
          if (i >= steps) {
            if (c.parentNode) c.parentNode.removeChild(c);
            if (done) done();
          } else {
            setTimeout(step, 24);
          }
        }
        setTimeout(step, 24);
      }
      function mid(p1, p2) { return { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 }; }

      function flashNode(el) {
        if (!el) return;
        var myGen = gen;
        el.classList.add("hit");
        setTimeout(function () { if (myGen === gen) el.classList.remove("hit"); }, 450);
      }

      /* ---- an avatar sends a message ---- */
      function clickUser(i) {
        var u = users[i];
        var from = pos(u);
        var others = users.length - 1;

        if (world === "without") {
          users.forEach(function (v, j) {
            if (j === i) return;
            var to = pos(v);
            pulseAlong(from, meshCtrl(i, j, from, to), to, "bad", (function (jj) {
              return function () { flashNode(nodeEls[jj]); };
            })(j));
          });
          setExplain(
            u.name + " sends a message",
            'One click, <span class="bad">' + others + ' separate links</span> — ' + u.name + " must personally know every receiver.");
        } else {
          var h = hubPos();
          pulseAlong(from, mid(from, h), h, "out", function () {
            flashNode(hubEl);
            users.forEach(function (v, j) {
              if (j === i) return;
              var to = pos(v);
              pulseAlong(h, mid(h, to), to, "good", (function (jj) {
                return function () { flashNode(nodeEls[jj]); };
              })(j));
            });
          });
          setExplain(
            u.name + " sends a message",
            u.name + ' talks to <span class="good">the hub only</span> — the <code>ChatRoom</code> routes it to the other ' + others + ".");
        }
      }

      /* ---- Eve joins ---- */
      function addUser() {
        if (users.length >= 5) return;
        var before = connections();
        users.push(EVE);
        render(true);
        var after = connections();
        if (world === "without") {
          setExplain(
            "Eve joins the mesh",
            '<span class="bad">' + (after - before) + " new links</span> flash red — every existing user had to change (" + before + " → " + after + ").");
        } else {
          setExplain(
            "Eve joins the room",
            '<span class="good">ONE new link</span> to the hub — nobody else changed (' + before + " → " + after + ").");
        }
      }

      /* ---- switch worlds ---- */
      function setWorld(w) {
        if (w === world) return;
        world = w;
        users = BASE.slice();
        render(false);
        if (w === "with") {
          setExplain(
            "Everyone knows ONE hub",
            '4 users, <span class="good">4</span> links — each holds a single reference to the <code>ChatRoom</code>.');
        } else {
          setExplain(
            "Everyone knows everyone",
            '4 users, <span class="bad">6</span> direct links — each object holds a reference to every other.');
        }
      }

      /* ---- reset ---- */
      function reset() {
        users = BASE.slice();
        render(false);
        setExplain(
          "Back to 4 users",
          "Click an avatar to send, then <code>＋ Add user</code> — and watch the connections chip.");
      }

      /* ---- boot ---- */
      render(false);
    </script>
    <script>(function(){function p(){var h=Math.ceil(Math.max(document.body.scrollHeight,document.body.getBoundingClientRect().height));parent.postMessage({type:"prototype:height",height:h},"*");}if(window.ResizeObserver)new ResizeObserver(p).observe(document.body);window.addEventListener("load",p);})();</script>
  </body>
</html>
