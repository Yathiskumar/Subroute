<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inheritance — Subroute</title>
    <style>
      :root {
        --bg: #0c0d10;
        --surface: #14161a;
        --elevated: #1a1d22;
        --border: #232830;
        --border-strong: #2d333d;
        --fg: #e8e4dc;
        --muted: #9099a8;
        --subtle: #6b7280;
        --accent: #fb863a;
        --accent-soft: rgba(251, 134, 58, 0.12);
        --accent-border: rgba(251, 134, 58, 0.32);
        --success: #5cc66f;
        --info: #5e9ff6;
        --danger: #f06868;
        --violet: #a78bfa;
        --mono: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
        --sans: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
        --r-md: 8px;
        --r-lg: 12px;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: var(--sans); }
      body {
        padding: 16px 18px 22px;
        background-image:
          linear-gradient(to right, rgba(255,255,255,0.022) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255,255,255,0.022) 1px, transparent 1px);
        background-size: 40px 40px;
      }
      .lab { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }

      .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); }

      .stage { display: grid; grid-template-columns: 1fr 320px; gap: 16px; align-items: start; }
      @media (max-width: 700px) { .stage { grid-template-columns: 1fr; } }

      /* ---- Family tree ---- */
      .tree { padding: 14px 14px 16px; }
      .tree-head { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
      .tree-head .ttl { font-size: 13px; font-weight: 600; }
      .tree-head .sub { margin-left: auto; font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--subtle); }

      /* class node (shared look) */
      .node { border: 1px solid var(--border); border-radius: var(--r-lg); background: var(--elevated); overflow: hidden; transition: border-color .18s, box-shadow .18s; }
      .node-bar { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-bottom: 1px solid var(--border); background: var(--surface); }
      .node-bar .kw { font-family: var(--mono); font-size: 12px; color: var(--accent); }
      .node-bar .nm { font-family: var(--mono); font-size: 13px; font-weight: 600; }
      .node-bar .tag { margin-left: auto; white-space: nowrap; font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--subtle); border: 1px solid var(--border); border-radius: 999px; padding: 2px 8px; }
      .node-body { padding: 9px 12px 11px; }

      .member { font-family: var(--mono); font-size: 11.5px; padding: 3px 6px; border-radius: 6px; color: var(--muted); display: flex; gap: 6px; align-items: baseline; transition: background .15s, color .15s; }
      .member .ty { color: var(--info); }
      .member b { color: var(--fg); font-weight: 600; }
      .member.flash { background: var(--accent-soft); color: var(--fg); }

      .base-node.lit { border-color: var(--accent-border); box-shadow: 0 0 0 1px var(--accent-border); }

      .section-lab { font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--subtle); margin: 2px 0 4px; }

      /* connectors */
      .connectors { display: grid; grid-template-columns: repeat(3, 1fr); height: 22px; margin: 0 6px; }
      .conn { position: relative; }
      .conn::before { content: ""; position: absolute; left: 50%; top: 0; width: 1px; height: 100%; background: var(--border-strong); }
      .conn::after { content: ""; position: absolute; left: 0; right: 0; top: 0; height: 1px; background: var(--border-strong); }
      .conn.lit::before, .conn.lit::after { background: var(--accent); }
      .conn:first-child::after { left: 50%; }
      .conn:last-child::after { right: 50%; }

      .subs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
      @media (max-width: 480px) { .subs { grid-template-columns: 1fr; } .connectors { display: none; } }

      .sub-node { cursor: pointer; }
      .sub-node:hover { border-color: var(--border-strong); }
      .sub-node.sel { border-color: var(--accent-border); box-shadow: 0 0 0 1px var(--accent-border); }
      .sub-node.lit { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
      .sub-node .node-bar .nm { font-size: 12px; }
      .sub-node .extends { font-family: var(--mono); font-size: 9px; color: var(--subtle); margin-top: 2px; }
      .sub-node .own { color: var(--success); }
      .sub-node .over { color: var(--violet); }

      /* ---- Instance card ---- */
      .inst { padding: 14px; position: sticky; top: 16px; }
      .inst-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
      .inst-head .nm { font-family: var(--mono); font-size: 13px; font-weight: 600; }
      .inst-head .pill { margin-left: auto; font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); border: 1px solid var(--accent-border); background: var(--accent-soft); border-radius: 999px; padding: 2px 8px; }
      .inst-sub { font-family: var(--mono); font-size: 10px; color: var(--subtle); margin-bottom: 12px; }

      .imember { font-family: var(--mono); font-size: 11.5px; padding: 5px 8px; border-radius: 6px; display: flex; align-items: center; gap: 8px; margin-bottom: 4px; border: 1px solid var(--border); background: var(--elevated); transition: background .15s, border-color .15s; }
      .imember .mn b { color: var(--fg); font-weight: 600; }
      .imember .mn { color: var(--muted); flex: 1; }
      .imember.flash { border-color: var(--accent-border); background: var(--accent-soft); }
      .badge { font-family: var(--mono); font-size: 8.5px; letter-spacing: 0.06em; text-transform: uppercase; border-radius: 999px; padding: 2px 7px; white-space: nowrap; }
      .badge.inh { color: var(--info); border: 1px solid rgba(94,159,246,0.4); background: rgba(94,159,246,0.1); }
      .badge.own { color: var(--success); border: 1px solid rgba(92,198,111,0.4); background: rgba(92,198,111,0.1); }
      .badge.over { color: var(--violet); border: 1px solid rgba(167,139,250,0.4); background: rgba(167,139,250,0.1); }

      .call-lab { font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--subtle); margin: 14px 0 7px; }
      .calls { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
      .calls .full { grid-column: 1 / -1; }

      .btn { background: var(--elevated); color: var(--fg); font: 600 12px/1 var(--sans); border: 1px solid var(--border); border-radius: var(--r-md); padding: 9px 12px; cursor: pointer; transition: filter .15s, transform .1s, border-color .15s; }
      .btn:hover { border-color: var(--border-strong); }
      .btn:active { transform: scale(0.97); }
      .btn.primary { background: var(--accent); color: #1a1003; border-color: transparent; width: 100%; padding: 11px; font-size: 13px; }
      .btn.primary:hover { filter: brightness(1.06); }
      .btn.sm { padding: 7px 9px; font-size: 11px; }
      .btn.own-btn { border-color: rgba(92,198,111,0.45); color: var(--success); }
      .btn.own-btn:hover { border-color: var(--success); }
      .btn.over-btn { border-color: rgba(167,139,250,0.45); color: var(--violet); }
      .btn.over-btn:hover { border-color: var(--violet); }

      /* ---- Console ---- */
      .console { margin-top: 16px; }
      .console-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
      .console-bar .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); }
      .log { background: #0a0b0e; border: 1px solid var(--border); border-radius: var(--r-md); padding: 10px 12px; font-family: var(--mono); font-size: 11.5px; line-height: 1.7; min-height: 92px; max-height: 150px; overflow-y: auto; }
      .log .ln { white-space: pre-wrap; }
      .log .muted { color: var(--subtle); }
      .log .c-accent { color: var(--accent); }
      .log .c-info { color: var(--info); }
      .log .c-success { color: var(--success); }
      .log .c-violet { color: var(--violet); }
      .log .c-danger { color: var(--danger); }
      .log .c-fg { color: var(--fg); }

      .hint { margin-top: 12px; font-size: 12px; color: var(--muted); display: flex; gap: 7px; align-items: flex-start; }
      .hint .b { color: var(--accent); }
    </style>
  </head>
  <body>
    <div class="stage">
      <!-- THE FAMILY TREE -->
      <div class="card tree">
        <div class="tree-head">
          <span class="ttl">The family tree</span>
          <span class="sub">click a subclass</span>
        </div>

        <!-- BASE CLASS -->
        <div class="node base-node" id="base-node">
          <div class="node-bar">
            <span class="kw">class</span>
            <span class="nm">Animal</span>
            <span class="tag">base class</span>
          </div>
          <div class="node-body">
            <div class="section-lab">field</div>
            <div class="member"><span class="ty">name</span></div>
            <div class="section-lab" style="margin-top:6px">methods</div>
            <div class="member" id="b-eat"><b>eat</b>()</div>
            <div class="member" id="b-sleep"><b>sleep</b>()</div>
            <div class="member" id="b-makeSound"><b>makeSound</b>()</div>
          </div>
        </div>

        <div class="connectors">
          <div class="conn" id="conn-dog"></div>
          <div class="conn" id="conn-cat"></div>
          <div class="conn" id="conn-bird"></div>
        </div>

        <!-- SUBCLASSES -->
        <div class="subs" id="subs"></div>
      </div>

      <!-- THE INSTANCE -->
      <div class="card inst" id="inst"></div>
    </div>

    <!-- CONSOLE -->
    <div class="console">
      <div class="console-bar">
        <span class="dot"></span>
        <span class="lab">console</span>
        <button class="btn sm" style="margin-left:auto" onclick="resetLog()">Clear log</button>
      </div>
      <div class="log" id="log"></div>
      <div class="hint">
        <span class="b">▸</span>
        <span>Each subclass <b style="color:var(--fg)">inherits</b> <em>eat / sleep</em> from <b style="color:var(--fg)">Animal</b>, <b style="color:var(--success)">adds</b> its own method, and <b style="color:var(--violet)">overrides</b> <em>makeSound()</em>. Call a method — the console tells you exactly where it resolves.</span>
      </div>
    </div>

    <script>
      // ---- model: subclasses, their own method + their overridden sound ----
      var SUBS = {
        Dog:  { name: "Dog",  emoji: "🐕", instance: "Rex",   ownMethod: "fetch",   ownDesc: "fetches the ball", sound: "Woof!" },
        Cat:  { name: "Cat",  emoji: "🐈", instance: "Milo",  ownMethod: "scratch", ownDesc: "scratches the post", sound: "Meow!" },
        Bird: { name: "Bird", emoji: "🐦", instance: "Kiwi",  ownMethod: "fly",     ownDesc: "flaps into the sky", sound: "Tweet!" },
      };
      var ORDER = ["Dog", "Cat", "Bird"];
      var selected = "Dog";

      // ---- log helper ----
      function log(html, cls) {
        var box = document.getElementById("log");
        var line = document.createElement("div");
        line.className = "ln" + (cls ? " " + cls : "");
        line.innerHTML = html;
        box.appendChild(line);
        while (box.children.length > 9) box.removeChild(box.firstChild);
        box.scrollTop = box.scrollHeight;
      }
      function resetLog() {
        document.getElementById("log").innerHTML = "";
        log('<span class="muted">// log cleared — call a method to see where it resolves</span>');
      }

      function flash(el) {
        if (!el) return;
        el.classList.add("flash");
        setTimeout(function () { el.classList.remove("flash"); }, 360);
      }

      // light up a node in the tree to show where the running method lives
      function litNode(which) {
        document.getElementById("base-node").classList.toggle("lit", which === "Animal");
        ORDER.forEach(function (k) {
          var n = document.getElementById("sub-" + k);
          var c = document.getElementById("conn-" + k.toLowerCase());
          if (n) n.classList.toggle("lit", which === k);
          if (c) c.classList.toggle("lit", which === k);
        });
        setTimeout(function () {
          document.getElementById("base-node").classList.remove("lit");
          ORDER.forEach(function (k) {
            var n = document.getElementById("sub-" + k);
            var c = document.getElementById("conn-" + k.toLowerCase());
            if (n) n.classList.remove("lit");
            if (c) c.classList.remove("lit");
          });
        }, 700);
      }

      // ---- render the subclass tree ----
      function renderSubs() {
        var host = document.getElementById("subs");
        host.innerHTML = ORDER.map(function (k) {
          var s = SUBS[k];
          var on = k === selected ? " sel" : "";
          return (
            '<div class="node sub-node' + on + '" id="sub-' + k + '" onclick="select(\'' + k + '\')">' +
              '<div class="node-bar">' +
                '<span class="kw">class</span>' +
                '<span class="nm">' + s.name + '</span>' +
              '</div>' +
              '<div class="node-body">' +
                '<div class="extends">extends Animal</div>' +
                '<div class="member"><b class="own">' + s.ownMethod + '</b><span class="own">()</span></div>' +
                '<div class="member"><b class="over">makeSound</b><span class="over">() ⟳</span></div>' +
              '</div>' +
            '</div>'
          );
        }).join("");
      }

      // ---- render the instance card for the selected subclass ----
      function renderInst() {
        var s = SUBS[selected];
        var host = document.getElementById("inst");
        host.innerHTML =
          '<div class="inst-head">' +
            '<span style="font-size:18px">' + s.emoji + '</span>' +
            '<span class="nm">' + s.instance + '</span>' +
            '<span class="pill">' + s.name + ' instance</span>' +
          '</div>' +
          '<div class="inst-sub">new ' + s.name + '("' + s.instance + '")  ·  is-a Animal</div>' +

          '<div class="imember" id="i-name"><span class="mn"><span style="color:var(--info)">name</span> = "' + s.instance + '"</span><span class="badge inh">inherited</span></div>' +
          '<div class="imember" id="i-eat"><span class="mn"><b>eat</b>()</span><span class="badge inh">inherited</span></div>' +
          '<div class="imember" id="i-sleep"><span class="mn"><b>sleep</b>()</span><span class="badge inh">inherited</span></div>' +
          '<div class="imember" id="i-makeSound"><span class="mn"><b>makeSound</b>()</span><span class="badge over">overridden</span></div>' +
          '<div class="imember" id="i-own"><span class="mn"><b>' + s.ownMethod + '</b>()</span><span class="badge own">own</span></div>' +

          '<div class="call-lab">call a method on ' + s.instance + '</div>' +
          '<div class="calls">' +
            '<button class="btn" onclick="callEat()">eat()</button>' +
            '<button class="btn" onclick="callSleep()">sleep()</button>' +
            '<button class="btn over-btn full" onclick="callSound()">makeSound()</button>' +
            '<button class="btn own-btn full" onclick="callOwn()">' + s.ownMethod + '()  ·  ' + s.name + ' only</button>' +
          '</div>';
      }

      function select(k) {
        selected = k;
        renderSubs();
        renderInst();
        var s = SUBS[k];
        log('<span class="muted">// selected </span><span class="c-fg">' + s.name + '</span><span class="muted"> — </span><span class="c-accent">' + s.instance + '</span><span class="muted"> is-a Animal</span>');
      }

      // ---- method calls (narrate where each resolves) ----
      function callEat() {
        var s = SUBS[selected];
        flash(document.getElementById("i-eat"));
        flash(document.getElementById("b-eat"));
        litNode("Animal");
        log(
          '<span class="c-accent">' + s.instance + '</span>.<span class="c-info">eat</span>() ' +
          '<span class="muted">→ inherited from</span> <span class="c-fg">Animal</span> ' +
          '<span class="muted">→</span> <span class="c-info">"' + s.instance + ' is eating"</span>'
        );
      }

      function callSleep() {
        var s = SUBS[selected];
        flash(document.getElementById("i-sleep"));
        flash(document.getElementById("b-sleep"));
        litNode("Animal");
        log(
          '<span class="c-accent">' + s.instance + '</span>.<span class="c-info">sleep</span>() ' +
          '<span class="muted">→ inherited from</span> <span class="c-fg">Animal</span> ' +
          '<span class="muted">→</span> <span class="c-info">"' + s.instance + ' is asleep 💤"</span>'
        );
      }

      function callSound() {
        var s = SUBS[selected];
        flash(document.getElementById("i-makeSound"));
        flash(document.getElementById("sub-" + selected).querySelector(".member:last-child"));
        litNode(selected);
        log(
          '<span class="c-accent">' + s.instance + '</span>.<span class="c-violet">makeSound</span>() ' +
          '<span class="muted">→</span> <span class="c-violet">' + s.name + ' overrides</span> ' +
          '<span class="muted">(not Animal\'s) →</span> <span class="c-violet">"' + s.sound + '"</span>'
        );
      }

      function callOwn() {
        var s = SUBS[selected];
        flash(document.getElementById("i-own"));
        flash(document.getElementById("sub-" + selected).querySelector(".member"));
        litNode(selected);
        log(
          '<span class="c-accent">' + s.instance + '</span>.<span class="c-success">' + s.ownMethod + '</span>() ' +
          '<span class="muted">→</span> <span class="c-success">' + s.name + '\'s own method</span> ' +
          '<span class="muted">(Animal has no ' + s.ownMethod + ') →</span> <span class="c-success">"' + s.instance + ' ' + s.ownDesc + '"</span>'
        );
      }

      // ---- init + seed ----
      renderSubs();
      renderInst();
      log('<span class="muted">// Dog selected. eat()/sleep() come from Animal; makeSound() is overridden.</span>');
      callSound(); // one example call on load
    </script>
    <script>(function(){function p(){var h=Math.ceil(Math.max(document.body.scrollHeight,document.body.getBoundingClientRect().height));parent.postMessage({type:"prototype:height",height:h},"*");}if(window.ResizeObserver)new ResizeObserver(p).observe(document.body);window.addEventListener("load",p);})();</script>
  </body>
</html>
