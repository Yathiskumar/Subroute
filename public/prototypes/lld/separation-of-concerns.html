<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Separation of Concerns — Subroute</title>
    <style>
      :root {
        --bg: #0c0d10;
        --surface: #14161a;
        --elevated: #1a1d22;
        --border: #232830;
        --border-strong: #2d333d;
        --fg: #e8e4dc;
        --muted: #9099a8;
        --subtle: #6b7280;
        --accent: #fb863a;
        --accent-soft: rgba(251, 134, 58, 0.12);
        --accent-border: rgba(251, 134, 58, 0.45);
        --success: #5cc66f;
        --success-soft: rgba(92, 198, 111, 0.12);
        --blue: #5e9ff6;
        --blue-soft: rgba(94, 159, 246, 0.16);
        --green: #5cc66f;
        --green-soft: rgba(92, 198, 111, 0.16);
        --orange: #fb863a;
        --orange-soft: rgba(251, 134, 58, 0.16);
        --violet: #a78bfa;
        --violet-soft: rgba(167, 139, 250, 0.16);
        --mono: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
        --sans: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
        --r-md: 8px;
        --r-lg: 12px;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: var(--sans); }
      body {
        padding: 16px 18px 22px;
        background-image:
          linear-gradient(to right, rgba(255,255,255,0.022) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255,255,255,0.022) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      /* ---- Top control row ---- */
      .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
      .btn { background: var(--elevated); color: var(--fg); font: 600 12px/1 var(--sans); border: 1px solid var(--border); border-radius: var(--r-md); padding: 10px 15px; cursor: pointer; transition: filter .15s, transform .1s, border-color .15s; }
      .btn:hover { border-color: var(--border-strong); }
      .btn:active { transform: scale(0.97); }
      .btn.primary { background: var(--accent); color: #1a1003; border-color: transparent; }
      .btn.primary:hover { filter: brightness(1.06); }
      .btn:disabled { opacity: .4; cursor: not-allowed; }
      .btn:disabled:active { transform: none; }

      .counter { margin-left: auto; font-family: var(--mono); font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
      .counter b { font-size: 18px; font-weight: 800; color: var(--accent); transition: color .25s; }
      .counter.clean b { color: var(--success); }

      /* ---- Stage ---- */
      .stage { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 18px 16px; }
      .stage-cap { font-family: var(--mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); text-align: center; margin-bottom: 16px; }

      /* ---- Tangled blob (one function box) ---- */
      .blob { width: 100%; max-width: 460px; margin: 0 auto; border: 1.5px solid var(--border-strong); border-radius: 8px; background: var(--bg); box-shadow: 0 8px 24px rgba(0,0,0,.32); overflow: hidden; }
      .blob-name { text-align: center; font-family: var(--mono); font-size: 13.5px; font-weight: 700; color: var(--fg); padding: 10px; border-bottom: 1px solid var(--border-strong); }
      .blob-name .paren { color: var(--subtle); }
      .lines { padding: 8px; display: flex; flex-direction: column; gap: 5px; }

      .line { font-family: var(--mono); font-size: 11.5px; padding: 6px 10px; border-radius: 5px; border-left: 3px solid transparent; transition: opacity .3s; }
      .line.c-val  { background: var(--blue-soft);   border-left-color: var(--blue);   color: #bcd6fb; }
      .line.c-biz  { background: var(--orange-soft); border-left-color: var(--orange); color: #fbcfa6; }
      .line.c-data { background: var(--green-soft);  border-left-color: var(--green);  color: #b6e6bf; }
      .line.c-pres { background: var(--violet-soft); border-left-color: var(--violet); color: #d4c7fb; }

      /* ---- Separated lanes ---- */
      .lanes { display: flex; flex-direction: column; gap: 12px; max-width: 460px; margin: 0 auto; }
      .lane { border: 1.5px solid var(--border-strong); border-radius: 8px; background: var(--bg); overflow: hidden; cursor: pointer; transition: border-color .15s, transform .1s, box-shadow .15s; }
      .lane:hover { transform: translateY(-2px); }
      .lane:active { transform: scale(0.995); }
      .lane-head { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; border-bottom: 1px solid var(--border-strong); }
      .lane-title { font-family: var(--mono); font-size: 12.5px; font-weight: 700; color: var(--fg); display: flex; align-items: center; gap: 8px; }
      .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
      .lane-badge { font-family: var(--mono); font-size: 10px; color: var(--success); background: var(--success-soft); border: 1px solid rgba(92,198,111,0.4); border-radius: 999px; padding: 2px 8px; }
      .lane-body { padding: 7px 12px; }
      .lane-body .line { margin-top: 5px; }
      .lane-body .line:first-child { margin-top: 0; }

      .lane.c-val  { border-color: var(--blue); }
      .lane.c-biz  { border-color: var(--orange); }
      .lane.c-data { border-color: var(--green); }
      .lane.c-pres { border-color: var(--violet); }
      .lane.c-val.sel  { box-shadow: 0 0 0 1px var(--blue), 0 0 18px var(--blue-soft); }
      .lane.c-biz.sel  { box-shadow: 0 0 0 1px var(--orange), 0 0 18px var(--orange-soft); }
      .lane.c-data.sel { box-shadow: 0 0 0 1px var(--green), 0 0 18px var(--green-soft); }
      .lane.c-pres.sel { box-shadow: 0 0 0 1px var(--violet), 0 0 18px var(--violet-soft); }

      .arrow { text-align: center; color: var(--subtle); font-size: 14px; margin: -4px 0; }

      /* ---- Fixed explanation panel (REPLACES content, never grows) ---- */
      .explain { margin-top: 16px; min-height: 92px; background: #0a0b0e; border: 1px solid var(--border); border-radius: var(--r-md); padding: 13px 15px; display: flex; flex-direction: column; justify-content: center; }
      .explain-title { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 5px; }
      .explain-body { font-size: 13px; line-height: 1.6; color: var(--fg); }
      .explain-body code { font-family: var(--mono); background: var(--elevated); color: var(--fg); padding: 1px 5px; border-radius: 4px; font-size: 11.5px; }
      .explain-body .dim { color: var(--muted); }
      .explain-body .good { color: var(--success); font-weight: 700; }
      .explain-body .bad { color: var(--danger, #f06868); font-weight: 700; }

      .hint { margin-top: 14px; font-size: 12px; color: var(--muted); display: flex; gap: 7px; align-items: flex-start; }
      .hint .b { color: var(--accent); }
    </style>
  </head>
  <body>
    <div class="controls">
      <button class="btn primary" id="btn-sep" onclick="separate()">Separate concerns</button>
      <button class="btn" id="btn-reset" onclick="tangle()" disabled>Re-tangle</button>
      <div class="counter" id="counter">
        <span id="counter-label">concerns crammed in:</span><b id="counter-val">4</b>
      </div>
    </div>

    <div class="stage">
      <div class="stage-cap" id="stage-cap">handleSignup() — four concerns in one function</div>

      <!-- TANGLED VIEW -->
      <div class="blob" id="blob">
        <div class="blob-name">handleSignup<span class="paren">(req)</span></div>
        <div class="lines" id="blob-lines"></div>
      </div>

      <!-- SEPARATED VIEW -->
      <div class="lanes" id="lanes" style="display:none"></div>
    </div>

    <!-- FIXED EXPLAIN PANEL (replaced, never appended) -->
    <div class="explain">
      <div class="explain-title" id="ex-title">—</div>
      <div class="explain-body" id="ex-body">—</div>
    </div>

    <div class="hint">
      <span class="b">▸</span>
      <span>One part, one concern. <b style="color:var(--fg)">Separate</b> the blob, then click a lane to see what a change to that concern now touches — <b style="color:var(--fg)">just that lane</b>.</span>
    </div>

    <script>
      /* ---------- one explanation panel, content REPLACED (never appended) ---------- */
      function setExplain(title, bodyHtml) {
        document.getElementById("ex-title").textContent = title;
        document.getElementById("ex-body").innerHTML = bodyHtml;
      }

      /* ---------- the four concerns and their lines ---------- */
      var CONCERNS = {
        val:  { key: "val",  cls: "c-val",  color: "#5e9ff6", label: "Validation",     mod: "validation.ts",    job: "is the input OK?" },
        biz:  { key: "biz",  cls: "c-biz",  color: "#fb863a", label: "Business Logic", mod: "signup-service.ts", job: "the product rules" },
        data: { key: "data", cls: "c-data", color: "#5cc66f", label: "Data Access",    mod: "users-repo.ts",    job: "talk to storage" },
        pres: { key: "pres", cls: "c-pres", color: "#a78bfa", label: "Presentation",   mod: "presenter.ts",     job: "shape the output" },
      };

      // interleaved order, as a tangled first draft would look
      var TANGLED = [
        { c: "val",  t: 'if (!email.includes("@")) return bad(400);' },
        { c: "biz",  t: 'const plan = "free";' },
        { c: "data", t: 'db.insert("users", { email, plan });' },
        { c: "val",  t: 'if (password.length < 8) return bad(400);' },
        { c: "pres", t: 'return "<h1>Welcome, " + email + "</h1>";' },
        { c: "biz",  t: 'if (blocked(email)) return bad(403);' },
        { c: "data", t: 'const user = db.read("users", email);' },
      ];

      // grouped per lane (after separating)
      var LANE_LINES = {
        val:  ['if (!email.includes("@")) return bad(400);', 'if (password.length < 8) return bad(400);'],
        biz:  ['const plan = "free";', 'if (blocked(email)) return bad(403);'],
        data: ['db.insert("users", { email, plan });', 'const user = db.read("users", email);'],
        pres: ['return "<h1>Welcome, " + email + "</h1>";'],
      };
      var LANE_ORDER = ["pres", "biz", "data"]; // diagram-style stack; we show all four though
      var STACK = ["val", "biz", "data", "pres"];

      var separated = false;
      var selected = null;

      /* ---------- render the tangled blob ---------- */
      function renderBlob() {
        var host = document.getElementById("blob-lines");
        host.innerHTML = "";
        TANGLED.forEach(function (l) {
          var div = document.createElement("div");
          div.className = "line " + CONCERNS[l.c].cls;
          div.textContent = l.t;
          host.appendChild(div);
        });
      }

      /* ---------- render the separated lanes ---------- */
      function renderLanes() {
        var host = document.getElementById("lanes");
        host.innerHTML = "";
        STACK.forEach(function (key, i) {
          var c = CONCERNS[key];
          var lane = document.createElement("div");
          lane.className = "lane " + c.cls + (selected === key ? " sel" : "");
          lane.onclick = (function (k) { return function () { selectLane(k); }; })(key);

          var lines = LANE_LINES[key].map(function (t) {
            return '<div class="line ' + c.cls + '">' + escapeHtml(t) + "</div>";
          }).join("");

          lane.innerHTML =
            '<div class="lane-head">' +
              '<div class="lane-title"><span class="dot" style="background:' + c.color + '"></span>' +
                c.label + ' <span style="color:var(--subtle);font-weight:400;font-size:10.5px">· ' + c.mod + '</span></div>' +
              '<div class="lane-badge">concerns: 1</div>' +
            '</div>' +
            '<div class="lane-body">' + lines + "</div>";

          host.appendChild(lane);

          if (i < STACK.length - 1) {
            var arr = document.createElement("div");
            arr.className = "arrow";
            arr.textContent = "↓";
            host.appendChild(arr);
          }
        });
      }

      function escapeHtml(s) {
        return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }

      /* ---------- selecting a lane: what does changing this concern touch? ---------- */
      var IMPACT = {
        val: {
          title: "Validation — change in isolation ✓",
          body: 'Tighten a rule (say, require a stronger password) and you edit <code>validation.ts</code> <b class="good">only</b>. ' +
                'The business rules, the database code, and the HTML never notice. <span class="dim">One concern, one reason to change.</span>',
        },
        biz: {
          title: "Business Logic — change in isolation ✓",
          body: 'Change a product rule (start new users on a <b>trial</b> plan instead of free) and you edit <code>signup-service.ts</code> <b class="good">only</b>. ' +
                'Validation, storage, and presentation are <b class="good">untouched</b> — and you can unit-test this rule with a fake repo, no database.',
        },
        data: {
          title: "Data Access — change in isolation ✓",
          body: 'Swap the DB (MySQL → Postgres) and <b class="good">only the Data Access layer changes</b>. ' +
                'Validation, business logic, and presentation never see a query string, so <span class="good">the other three are untouched.</span> <span class="dim">That isolation is the whole point.</span>',
        },
        pres: {
          title: "Presentation — change in isolation ✓",
          body: 'Add a JSON response for the mobile app, or restyle the HTML, and you edit <code>presenter.ts</code> <b class="good">only</b>. ' +
                'The rules and the storage <b class="good">don\'t change at all</b> — they don\'t care how the result is shown.',
        },
      };

      function selectLane(key) {
        if (!separated) return;
        selected = key;
        renderLanes();
        var im = IMPACT[key];
        setExplain(im.title, im.body);
      }

      /* ---------- mode transitions ---------- */
      function separate() {
        separated = true;
        selected = null;
        document.getElementById("blob").style.display = "none";
        document.getElementById("lanes").style.display = "block";
        document.getElementById("btn-sep").disabled = true;
        document.getElementById("btn-reset").disabled = false;
        document.getElementById("stage-cap").textContent = "four single-concern lanes — each its own module";
        document.getElementById("counter-label").textContent = "concerns per part:";
        document.getElementById("counter-val").textContent = "1";
        document.getElementById("counter").classList.add("clean");
        renderLanes();
        setExplain(
          "Separated — one part, one concern",
          'The tangle is now four <b>single-concern</b> modules: <code>Validation → Business Logic → Data Access → Presentation</code>, each showing <span class="good">concerns: 1</span>. ' +
          'Nothing was deleted — the same work is just <b>sorted</b> so each part has one job. ' +
          '<span class="dim">Click a lane to see what changing that concern now touches.</span>'
        );
      }

      function tangle() {
        separated = false;
        selected = null;
        document.getElementById("blob").style.display = "block";
        document.getElementById("lanes").style.display = "none";
        document.getElementById("btn-sep").disabled = false;
        document.getElementById("btn-reset").disabled = true;
        document.getElementById("stage-cap").textContent = "handleSignup() — four concerns in one function";
        document.getElementById("counter-label").textContent = "concerns crammed in:";
        document.getElementById("counter-val").textContent = "4";
        document.getElementById("counter").classList.remove("clean");
        setExplain(
          "Tangled — one function does everything",
          'Inside <code>handleSignup()</code> four concerns are <b class="bad">interleaved</b> line by line: ' +
          '<span style="color:#5e9ff6">validation</span>, <span style="color:#fb863a">business rules</span>, ' +
          '<span style="color:#5cc66f">data access</span>, <span style="color:#a78bfa">presentation</span>. ' +
          'Change any one — swap the DB, retheme the HTML — and you <b class="bad">risk breaking the rest</b>. ' +
          '<span class="dim">Press “Separate concerns”.</span>'
        );
      }

      /* ---------- boot ---------- */
      renderBlob();
      tangle();
    </script>
    <script>(function(){function p(){var h=Math.max(document.documentElement.scrollHeight,document.body.scrollHeight);parent.postMessage({type:"prototype:height",height:h},"*");}if(window.ResizeObserver)new ResizeObserver(p).observe(document.body);window.addEventListener("load",p);})();</script>
  </body>
</html>
