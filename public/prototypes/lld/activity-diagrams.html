<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Activity Diagrams — Subroute</title>
    <style>
      :root {
        --bg: #0c0d10;
        --surface: #14161a;
        --elevated: #1a1d22;
        --border: #232830;
        --border-strong: #2d333d;
        --fg: #e8e4dc;
        --muted: #9099a8;
        --subtle: #6b7280;
        --accent: #fb863a;
        --accent-soft: rgba(251, 134, 58, 0.12);
        --accent-border: rgba(251, 134, 58, 0.45);
        --success: #5cc66f;
        --success-soft: rgba(92, 198, 111, 0.12);
        --info: #5e9ff6;
        --info-soft: rgba(94, 159, 246, 0.12);
        --danger: #f06868;
        --violet: #a78bfa;
        --mono: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
        --sans: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
        --r-md: 8px;
        --r-lg: 12px;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: var(--sans); }
      body {
        padding: 16px 18px 22px;
        background-image:
          linear-gradient(to right, rgba(255,255,255,0.022) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255,255,255,0.022) 1px, transparent 1px);
        background-size: 40px 40px;
      }
      .lab { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }

      /* ---- Buttons ---- */
      .btn { background: var(--elevated); color: var(--fg); font: 600 12px/1 var(--sans); border: 1px solid var(--border); border-radius: var(--r-md); padding: 9px 14px; cursor: pointer; transition: filter .15s, transform .1s, border-color .15s; }
      .btn:hover { border-color: var(--border-strong); }
      .btn:active { transform: scale(0.97); }
      .btn.primary { background: var(--accent); color: #1a1003; border-color: transparent; }
      .btn.primary:hover { filter: brightness(1.06); }
      .btn.ghost { background: transparent; }
      .btn:disabled { opacity: .4; cursor: not-allowed; }
      .btn:disabled:active { transform: none; }

      /* ---- The diagram stage: ONE svg, everything scales together ---- */
      .stage { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 14px; display: flex; justify-content: center; }
      .stage svg { display: block; width: 100%; max-width: 440px; height: auto; overflow: visible; }

      /* edges */
      .edge { stroke: var(--border-strong); stroke-width: 1.7; fill: none; transition: stroke .25s; }
      .edge.lit { stroke: var(--accent); }
      .edge.dim { opacity: .22; }

      /* nodes */
      .a-act rect, .a-dec polygon { fill: var(--bg); stroke: var(--border-strong); stroke-width: 1.6; transition: fill .25s, stroke .25s, stroke-width .2s; }
      .a-act text { fill: var(--fg); font: 12px var(--mono); text-anchor: middle; }
      .a-act.sm text { font-size: 10px; }
      .a-dec text { fill: var(--fg); font: 11px var(--mono); text-anchor: middle; }
      .a-bar { fill: var(--fg); transition: fill .25s; }
      .a-dot { fill: var(--fg); transition: fill .25s; }
      .a-fin .ring { fill: none; stroke: var(--fg); stroke-width: 2; transition: stroke .25s; }
      .a-fin .core { fill: var(--fg); transition: fill .25s; }

      /* lit / "token here" highlight */
      .a-act.hot rect, .a-dec.hot polygon { stroke: var(--accent); stroke-width: 2.2; fill: var(--accent-soft); }
      .a-bar.hot { fill: var(--accent); }
      .a-dot.hot { fill: var(--accent); }
      .a-fin.hot .ring { stroke: var(--accent); }
      .a-fin.hot .core { fill: var(--accent); }
      .a-node.dim { opacity: .28; }

      /* guard labels */
      .guard text { fill: var(--muted); font: 10px var(--mono); text-anchor: middle; transition: fill .2s; }
      .guard.lit text { fill: var(--accent); }
      .guard.dim { opacity: .25; }

      /* "parallel" tag near the fork */
      .ptag { fill: var(--accent); font: 9px var(--mono); letter-spacing: .08em; text-anchor: start; opacity: 0; transition: opacity .25s; }
      .ptag.show { opacity: 1; }

      /* ---- Branch chooser ---- */
      .chooser { margin-top: 14px; display: flex; gap: 8px; align-items: center; }
      .chooser .lbl { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-right: 2px; }
      .pick.on { background: var(--accent-soft); border-color: var(--accent-border); color: var(--fg); }

      /* ---- Step controls ---- */
      .controls { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
      .controls .step-pill { font-family: var(--mono); font-size: 11px; color: var(--muted); }
      .controls .step-pill b { color: var(--fg); font-variant-numeric: tabular-nums; }
      .controls .spacer { flex: 1; }

      /* ---- Fixed explanation panel (REPLACES content, never grows) ---- */
      .explain { margin-top: 14px; min-height: 88px; background: #0a0b0e; border: 1px solid var(--border); border-radius: var(--r-md); padding: 13px 15px; display: flex; flex-direction: column; justify-content: center; }
      .explain-title { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 5px; }
      .explain-body { font-size: 13px; line-height: 1.6; color: var(--fg); }
      .explain-body code { font-family: var(--mono); background: var(--elevated); color: var(--fg); padding: 1px 5px; border-radius: 4px; font-size: 11.5px; }
      .explain-body .dim { color: var(--muted); }

      .hint { margin-top: 14px; font-size: 12px; color: var(--muted); display: flex; gap: 7px; align-items: flex-start; }
      .hint .b { color: var(--accent); }
    </style>
  </head>
  <body>
    <div class="lab" style="margin-bottom:10px;">▸ Walk a workflow from start to finish — placing an online order</div>

    <!-- ============ DIAGRAM STAGE (single SVG) ============ -->
    <div class="stage">
      <svg viewBox="0 0 480 600" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Activity diagram of placing an order">
        <defs>
          <marker id="ah" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
            <path d="M0,0 L7,3 L0,6 z" fill="context-stroke" />
          </marker>
        </defs>

        <!-- ===== edges (behind nodes) ===== -->
        <path id="e-start"    class="edge" d="M150,41 L150,58"            marker-end="url(#ah)" />
        <path id="e-cart"     class="edge" d="M150,98 L150,120"           marker-end="url(#ah)" />
        <path id="e-checkout" class="edge" d="M150,160 L150,166"          marker-end="url(#ah)" />
        <!-- decision out: in stock (down) and out of stock (right-down) -->
        <path id="e-yes"      class="edge" d="M150,270 L150,300"          marker-end="url(#ah)" />
        <path id="e-no"       class="edge" d="M212,218 L375,218 L375,300" marker-end="url(#ah)" />
        <!-- in-stock path -->
        <path id="e-charge"   class="edge" d="M150,340 L150,371"          marker-end="url(#ah)" />
        <!-- fork split into two parallels -->
        <path id="e-f1"       class="edge" d="M80,379 L80,410"            marker-end="url(#ah)" />
        <path id="e-f2"       class="edge" d="M220,379 L220,410"          marker-end="url(#ah)" />
        <!-- parallels into join bar -->
        <path id="e-j1"       class="edge" d="M80,454 L80,486"            marker-end="url(#ah)" />
        <path id="e-j2"       class="edge" d="M220,454 L220,486"          marker-end="url(#ah)" />
        <!-- join to ship -->
        <path id="e-ship"     class="edge" d="M150,494 L150,522"          marker-end="url(#ah)" />
        <!-- out-of-stock path -->
        <path id="e-oos"      class="edge" d="M375,344 L375,377"          marker-end="url(#ah)" />

        <!-- ===== guard labels ===== -->
        <g class="guard" id="g-yes"><text x="108" y="290">[in stock]</text></g>
        <g class="guard" id="g-no"><text x="293" y="210">[out of stock]</text></g>

        <!-- ===== parallel tag ===== -->
        <text class="ptag" id="p-tag" x="262" y="378">∥ parallel</text>

        <!-- ===== nodes ===== -->
        <!-- start -->
        <circle class="a-node a-dot" id="n-start" cx="150" cy="30" r="11" />

        <!-- Add item to cart -->
        <g class="a-node a-act" id="n-cart">
          <rect x="75" y="58" width="150" height="40" rx="18" />
          <text x="150" y="82">Add item to cart</text>
        </g>
        <!-- Checkout -->
        <g class="a-node a-act" id="n-checkout">
          <rect x="75" y="120" width="150" height="40" rx="18" />
          <text x="150" y="144">Checkout</text>
        </g>
        <!-- decision -->
        <g class="a-node a-dec" id="n-decision">
          <polygon points="150,166 212,218 150,270 88,218" />
          <text x="150" y="222">in stock?</text>
        </g>

        <!-- in-stock branch -->
        <g class="a-node a-act" id="n-charge">
          <rect x="75" y="300" width="150" height="40" rx="18" />
          <text x="150" y="324">Charge payment</text>
        </g>
        <!-- fork bar -->
        <rect class="a-node a-bar" id="n-fork" x="50" y="371" width="200" height="8" rx="3" />
        <!-- two parallel actions -->
        <g class="a-node a-act sm" id="n-email">
          <rect x="20" y="410" width="120" height="44" rx="16" />
          <text x="80" y="430">Send confirm.</text>
          <text x="80" y="445">email</text>
        </g>
        <g class="a-node a-act sm" id="n-inv">
          <rect x="160" y="410" width="120" height="44" rx="16" />
          <text x="220" y="430">Reserve</text>
          <text x="220" y="445">inventory</text>
        </g>
        <!-- join bar -->
        <rect class="a-node a-bar" id="n-join" x="50" y="486" width="200" height="8" rx="3" />
        <!-- ship -->
        <g class="a-node a-act" id="n-ship">
          <rect x="75" y="522" width="150" height="40" rx="18" />
          <text x="150" y="546">Ship order</text>
        </g>
        <!-- end (success) -->
        <g class="a-node a-fin" id="n-end">
          <circle class="ring" cx="150" cy="585" r="11" />
          <circle class="core" cx="150" cy="585" r="5" />
        </g>

        <!-- out-of-stock branch -->
        <g class="a-node a-act sm" id="n-oos">
          <rect x="300" y="300" width="150" height="44" rx="16" />
          <text x="375" y="320">Notify</text>
          <text x="375" y="335">out of stock</text>
        </g>
        <g class="a-node a-fin" id="n-endoos">
          <circle class="ring" cx="375" cy="390" r="11" />
          <circle class="core" cx="375" cy="390" r="5" />
        </g>
      </svg>
    </div>

    <!-- branch chooser (only used at the decision step) -->
    <div class="chooser" id="chooser" style="display:none;">
      <span class="lbl">pick a branch:</span>
      <button class="btn pick" id="pick-yes" onclick="pickBranch('yes')">in stock</button>
      <button class="btn pick" id="pick-no"  onclick="pickBranch('no')">out of stock</button>
    </div>

    <!-- controls -->
    <div class="controls">
      <button class="btn" id="prev" onclick="step(-1)">‹ Back</button>
      <button class="btn primary" id="next" onclick="step(1)">Next ›</button>
      <span class="spacer"></span>
      <span class="step-pill">node <b id="cur">1</b> / <b id="tot">1</b></span>
    </div>

    <!-- single fixed explanation panel -->
    <div class="explain">
      <div class="explain-title" id="x-title">—</div>
      <div class="explain-body" id="x-body">—</div>
    </div>

    <div class="hint">
      <span class="b">▸</span>
      <span>Five shapes to know: <b style="color:var(--fg)">● start</b>, <b style="color:var(--fg)">▭ action</b>, <b style="color:var(--fg)">◇ decision</b>, <b style="color:var(--fg)">▬ fork/join (parallel)</b>, <b style="color:var(--fg)">◉ end</b>.</span>
    </div>

    <script>
      /* ---------- one explanation panel, content REPLACED (never appended) ---------- */
      function setExplain(title, bodyHtml) {
        document.getElementById("x-title").textContent = title;
        document.getElementById("x-body").innerHTML = bodyHtml;
      }

      /* Each step: which node to light, which edges into it to light, and the note. */
      var COMMON = [
        {
          node: "n-start", edges: [],
          title: "● Start — initial node",
          body: 'A <b>filled black circle</b> marks where the workflow begins. There is exactly one. The arrow leads to the first real step.',
        },
        {
          node: "n-cart", edges: ["e-start"],
          title: "▭ Action — Add item to cart",
          body: 'A <b>rounded rectangle</b> is one <b>action</b> (a step of work). An <span class="dim">arrow</span> = control flow: do this, <i>then</i> the next thing.',
        },
        {
          node: "n-checkout", edges: ["e-cart"],
          title: "▭ Action — Checkout",
          body: 'Another action box. Most of an activity diagram is just actions chained by arrows in the order they happen.',
        },
        {
          node: "n-decision", edges: ["e-checkout"],
          title: "◇ Decision — a branch",
          body: 'A <b>diamond</b> with one arrow in and two out. Each branch has a <b>guard</b> in brackets — <code>[in stock]</code> or <code>[out of stock]</code>. The flow takes whichever guard is true. <b>Pick a branch below to continue.</b>',
          choose: true,
        },
      ];

      // Path taken AFTER the decision, depending on the chosen branch.
      var YES_PATH = [
        {
          node: "n-charge", edges: ["e-yes"], guard: "g-yes",
          title: "▭ Action — Charge payment  · [in stock]",
          body: 'We took the <code>[in stock]</code> branch. This is a normal action box on that path.',
        },
        {
          node: "n-fork", edges: ["e-charge"], ptag: true,
          title: "▬ Fork — split into PARALLEL work",
          body: 'A <b>thick bar</b> with one arrow in, two out. Everything after a fork runs <b>at the same time</b> — an <i>and</i>, not an or. Here: send the email <b>and</b> reserve inventory, together.',
        },
        {
          node: ["n-email", "n-inv"], edges: ["e-f1", "e-f2"], ptag: true,
          title: "▭ ▭ Two actions running in parallel",
          body: '<b>Both</b> actions are active at once — <code>Send confirmation email</code> and <code>Reserve inventory</code>. Neither waits for the other.',
        },
        {
          node: "n-join", edges: ["e-j1", "e-j2"],
          title: "▬ Join — wait for ALL parallel flows",
          body: 'The matching <b>bar</b> with two arrows in, one out. A join <b>waits for every parallel flow to finish</b> before the workflow moves on.',
        },
        {
          node: "n-ship", edges: ["e-ship"],
          title: "▭ Action — Ship order",
          body: 'Once both parallel steps are done and joined, we continue with one more action.',
        },
        {
          node: "n-end", edges: [],
          title: "◉ End — final node",
          body: 'A <b>filled circle with a ring</b> ends the workflow. A diagram can have more than one end — this is the success ending.',
        },
      ];

      var NO_PATH = [
        {
          node: "n-oos", edges: ["e-no"], guard: "g-no",
          title: "▭ Action — Notify out of stock  · [out of stock]",
          body: 'We took the <code>[out of stock]</code> branch instead. A single action handles this case.',
        },
        {
          node: "n-endoos", edges: ["e-oos"],
          title: "◉ End — final node",
          body: 'A <b>filled circle with a ring</b> ends the workflow. This is the out-of-stock ending — a second, separate end node.',
        },
      ];

      var ALL_NODES = ["n-start","n-cart","n-checkout","n-decision","n-charge","n-fork","n-email","n-inv","n-join","n-ship","n-end","n-oos","n-endoos"];
      var ALL_EDGES = ["e-start","e-cart","e-checkout","e-yes","e-no","e-charge","e-f1","e-f2","e-j1","e-j2","e-ship","e-oos"];
      var ALL_GUARDS = ["g-yes","g-no"];

      var branch = null;      // null until chosen, then "yes" | "no"
      var idx = 0;

      function steps() {
        if (branch === "yes") return COMMON.concat(YES_PATH);
        if (branch === "no")  return COMMON.concat(NO_PATH);
        return COMMON;        // before a branch is chosen, only the common prefix exists
      }

      function dimEverythingPast() {
        var dimNodes = [], dimEdges = [], dimGuards = [];
        if (branch === "yes") { dimNodes = ["n-oos","n-endoos"]; dimEdges = ["e-no"]; dimGuards = ["g-no"]; }
        else if (branch === "no") {
          dimNodes = ["n-charge","n-fork","n-email","n-inv","n-join","n-ship","n-end"];
          dimEdges = ["e-yes","e-charge","e-f1","e-f2","e-j1","e-j2","e-ship"];
          dimGuards = ["g-yes"];
        }
        dimNodes.forEach(function (id) { document.getElementById(id).classList.add("dim"); });
        dimEdges.forEach(function (id) {
          document.getElementById(id).classList.add("dim");
          document.getElementById(id).classList.remove("lit");
        });
        dimGuards.forEach(function (id) { document.getElementById(id).classList.add("dim"); });
      }

      function render() {
        var seq = steps();
        var s = seq[idx];

        // reset all
        ALL_NODES.forEach(function (id) { var e = document.getElementById(id); e.classList.remove("hot","dim"); });
        ALL_EDGES.forEach(function (id) { var e = document.getElementById(id); e.classList.remove("lit","dim"); });
        ALL_GUARDS.forEach(function (id) { var e = document.getElementById(id); e.classList.remove("lit","dim"); });
        document.getElementById("p-tag").classList.remove("show");

        if (branch) dimEverythingPast();

        // light the active node(s)
        var nodes = Array.isArray(s.node) ? s.node : [s.node];
        nodes.forEach(function (id) { document.getElementById(id).classList.add("hot"); });

        // light the edges leading into it
        (s.edges || []).forEach(function (id) {
          var e = document.getElementById(id);
          e.classList.add("lit"); e.classList.remove("dim");
        });
        if (s.guard) { var g = document.getElementById(s.guard); g.classList.add("lit"); g.classList.remove("dim"); }
        if (s.ptag) document.getElementById("p-tag").classList.add("show");

        // chooser visibility
        var atDecision = !!s.choose && branch === null;
        document.getElementById("chooser").style.display = atDecision ? "flex" : "none";
        document.getElementById("pick-yes").classList.toggle("on", branch === "yes");
        document.getElementById("pick-no").classList.toggle("on", branch === "no");

        // counters
        document.getElementById("cur").textContent = idx + 1;
        document.getElementById("tot").textContent = seq.length;
        setExplain(s.title, s.body);

        // buttons
        document.getElementById("prev").disabled = idx === 0;
        var nextBtn = document.getElementById("next");
        var lastReachable = idx === seq.length - 1;
        if (atDecision && branch === null) {
          nextBtn.disabled = true;
          nextBtn.textContent = "Pick a branch";
        } else if (lastReachable) {
          nextBtn.disabled = false;
          nextBtn.textContent = "Start over";
        } else {
          nextBtn.disabled = false;
          nextBtn.textContent = "Next ›";
        }
      }

      function step(dir) {
        var seq = steps();
        if (dir > 0 && idx === seq.length - 1 && branch !== null) {
          branch = null; idx = 0; render(); return;
        }
        if (dir > 0 && steps()[idx] && steps()[idx].choose && branch === null) return;
        idx = Math.max(0, Math.min(steps().length - 1, idx + dir));
        if (idx < COMMON.length - 1) branch = (idx >= 0 ? branch : null);
        render();
      }

      function pickBranch(which) {
        branch = which;
        idx = COMMON.length;     // jump to the first node after the decision
        render();
      }

      /* ---------- boot ---------- */
      render();
    </script>
    <script>(function(){function p(){var h=Math.max(document.documentElement.scrollHeight,document.body.scrollHeight);parent.postMessage({type:"prototype:height",height:h},"*");}if(window.ResizeObserver)new ResizeObserver(p).observe(document.body);window.addEventListener("load",p);})();</script>
  </body>
</html>
