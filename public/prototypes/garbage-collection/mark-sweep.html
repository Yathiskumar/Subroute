<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Garbage Collection — Mark &amp; Sweep</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
      :root {
        --bg: #0c0d10; --surface: #14161a; --elevated: #1a1d22;
        --border: #232830; --border-strong: #2d333d;
        --fg: #e8e4dc; --muted: #9099a8; --subtle: #6b7280;
        --accent: #fb863a;
        --success: #5cc66f; --success-soft: rgba(92,198,111,0.14); --success-border: rgba(92,198,111,0.40);
        --danger: #f06868; --danger-soft: rgba(240,104,104,0.14); --danger-border: rgba(240,104,104,0.42);
        --info: #5e9ff6; --info-soft: rgba(94,159,246,0.14); --info-border: rgba(94,159,246,0.40);
        --warning: #f0b568; --warning-soft: rgba(240,181,104,0.14); --warning-border: rgba(240,181,104,0.40);
        --mono: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
        --sans: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; min-height: 100%; background: var(--bg); color: var(--fg); font-family: var(--sans); font-size: 13px; }
      body {
        padding: 14px 16px 16px;
        background-image: linear-gradient(to right, rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.025) 1px, transparent 1px);
        background-size: 40px 40px;
      }
      .container { max-width: 980px; margin: 0 auto; }

      .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
      .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; }
      .stat .lbl { font-size: 11px; color: var(--muted); }
      .stat .val { font-size: 18px; font-weight: 600; margin-top: 2px; font-variant-numeric: tabular-nums; }
      .stat.green { background: var(--success-soft); border-color: var(--success-border); }
      .stat.green .lbl { color: var(--success); }
      .stat.red { background: var(--danger-soft); border-color: var(--danger-border); }
      .stat.red .lbl { color: var(--danger); }
      .stat .val.phase { font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; }

      .tabs { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
      .tab { background: var(--elevated); color: var(--muted); border: 1px solid var(--border); border-radius: 999px; cursor: pointer; padding: 6px 13px; font: 500 12px/1 var(--sans); transition: all 150ms ease; white-space: nowrap; }
      .tab:hover { border-color: var(--border-strong); color: var(--fg); }
      .tab.active { background: var(--info-soft); color: var(--info); border-color: var(--info-border); }

      .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 8px; padding: 0 2px; }
      .legend .item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
      .legend .sw { width: 13px; height: 13px; border-radius: 3px; border: 1px solid; }
      .sw.unmarked { background: rgba(94,159,246,0.06); border-color: var(--border-strong); }
      .sw.scanning { background: var(--warning-soft); border-color: var(--warning); }
      .sw.marked { background: var(--success-soft); border-color: var(--success); }
      .sw.garbage { background: var(--danger-soft); border-color: var(--danger); border-style: dashed; }

      .stage { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 6px; margin-bottom: 10px; }
      svg { width: 100%; height: 280px; display: block; }

      .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; }
      .panel .ttl { font-size: 10px; color: var(--subtle); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
      #narration { font-size: 12.5px; line-height: 1.6; color: var(--fg); min-height: 38px; }
      #narration .em { color: var(--accent); font-weight: 600; }
      #narration b { color: var(--fg); }

      .controls { display: flex; gap: 8px; align-items: center; }
      button { background: var(--elevated); color: var(--fg); font: 500 12px/1 var(--sans); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; padding: 9px 13px; transition: filter 150ms ease, transform 100ms ease, background 150ms ease, border-color 150ms ease; white-space: nowrap; display: inline-flex; align-items: center; gap: 5px; }
      button:hover:not(:disabled) { border-color: var(--border-strong); background: var(--surface); }
      button:active:not(:disabled) { transform: scale(0.97); }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      button.primary { background: var(--accent); color: #1a1003; border-color: transparent; font-weight: 600; }
      button.primary:hover:not(:disabled) { filter: brightness(1.10); background: var(--accent); }
      button.ghost { background: transparent; }
      .counter { margin-left: auto; font: 12px var(--mono); color: var(--muted); }
      .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
    </style>
  </head>
  <body>
    <h2 class="sr-only">Mark and sweep walkthrough: trace reachable objects from the roots in the mark phase, then free everything unmarked in the sweep phase.</h2>
    <div class="container">
      <div class="stats">
        <div class="stat"><div class="lbl">Heap objects</div><div class="val" id="s-total">0</div></div>
        <div class="stat green"><div class="lbl">Marked alive</div><div class="val" id="s-marked">0</div></div>
        <div class="stat red"><div class="lbl">Garbage freed</div><div class="val" id="s-garbage">0</div></div>
        <div class="stat"><div class="lbl">Phase</div><div class="val phase" id="s-phase">idle</div></div>
      </div>

      <div class="tabs" id="tabs">
        <button class="tab active" data-scn="basic">1 · Basic trace</button>
        <button class="tab" data-scn="cycle">2 · Cycle wins</button>
        <button class="tab" data-scn="island">3 · Floating island</button>
      </div>

      <div class="legend">
        <div class="item"><span class="sw unmarked"></span>Unmarked</div>
        <div class="item"><span class="sw scanning"></span>Scanning</div>
        <div class="item"><span class="sw marked"></span>Marked (alive)</div>
        <div class="item"><span class="sw garbage"></span>Garbage</div>
      </div>

      <div class="stage">
        <svg viewBox="0 0 720 300" role="img" aria-label="Mark and sweep visualization">
          <defs>
            <marker id="ms-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#7d8694"/></marker>
            <marker id="ms-arr-live" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#5cc66f"/></marker>
          </defs>
          <text x="78" y="20" text-anchor="middle" font-size="10" fill="#6b7280" letter-spacing="1.5">ROOTS</text>
          <text x="420" y="20" text-anchor="middle" font-size="10" fill="#6b7280" letter-spacing="1.5">HEAP</text>
          <line x1="168" y1="32" x2="168" y2="292" stroke="#232830" stroke-width="1" stroke-dasharray="3 4"/>
          <g id="refs"></g>
          <g id="roots"></g>
          <g id="objs"></g>
        </svg>
      </div>

      <div class="panel">
        <div class="ttl">What's happening</div>
        <div id="narration"></div>
      </div>

      <div class="controls">
        <button id="prev"><i class="ti ti-arrow-left"></i>Prev</button>
        <button id="next" class="primary">Next step<i class="ti ti-arrow-right"></i></button>
        <button id="auto" class="ghost"><i class="ti ti-player-play"></i>Auto</button>
        <button id="restart" class="ghost"><i class="ti ti-refresh"></i>Restart</button>
        <span class="counter" id="counter">Step 1 / 11</span>
      </div>
    </div>

    <script>
      (function () {
        // Report content height so the embedding frame can size to fit (no inner scroll).
        function postHeight() { const h = Math.max(document.documentElement.scrollHeight, document.body.scrollHeight); parent.postMessage({ type: "prototype:height", height: h }, "*"); }
        if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);
        window.addEventListener("load", postHeight);
        const NS = "http://www.w3.org/2000/svg";
        const svg = (t, a) => { const e = document.createElementNS(NS, t); for (const k in a) e.setAttribute(k, a[k]); return e; };

        const SCN = {
          basic: {
            roots: ["x", "y"], rootRefs: { x: "A", y: "D" },
            objs: [
              { id: "A", x: 270, y: 75, refs: ["B", "C"] }, { id: "B", x: 410, y: 60, refs: [] },
              { id: "C", x: 410, y: 135, refs: ["D"] }, { id: "D", x: 555, y: 135, refs: [] },
              { id: "E", x: 270, y: 240, refs: ["F"] }, { id: "F", x: 410, y: 240, refs: [] }, { id: "G", x: 555, y: 240, refs: [] },
            ],
            steps: [
              { phase: "idle", marked: [], scanning: null, garbage: [], narr: "Heap has 7 objects. Roots <b>x</b> and <b>y</b> point in. E, F, G have no root pointing at them — but the GC doesn't know that yet." },
              { phase: "mark", marked: [], scanning: "A", garbage: [], narr: "<b>MARK PHASE.</b> Follow root x → A. Scanning A." },
              { phase: "mark", marked: ["A"], scanning: "B", garbage: [], narr: "A is marked alive. Follow A's pointers — scanning B." },
              { phase: "mark", marked: ["A", "B"], scanning: "C", garbage: [], narr: "B marked. Now scanning C (also reached from A)." },
              { phase: "mark", marked: ["A", "B", "C"], scanning: "D", garbage: [], narr: "C marked. Follow C → D. Scanning D." },
              { phase: "mark", marked: ["A", "B", "C", "D"], scanning: null, garbage: [], narr: "D marked. Root y also points at D — already marked, skip. The reachable graph is fully traced." },
              { phase: "sweep", marked: ["A", "B", "C", "D"], scanning: "E", garbage: [], narr: "<b>SWEEP PHASE.</b> Walk the whole heap. E is unmarked → <span class='em'>garbage</span>." },
              { phase: "sweep", marked: ["A", "B", "C", "D"], scanning: "F", garbage: ["E"], narr: "F is unmarked → garbage. E is freed." },
              { phase: "sweep", marked: ["A", "B", "C", "D"], scanning: "G", garbage: ["E", "F"], narr: "G is unmarked → garbage. F is freed." },
              { phase: "sweep", marked: ["A", "B", "C", "D"], scanning: null, garbage: ["E", "F", "G"], narr: "Sweep complete. E, F, G reclaimed; A–D survive. Marks reset for the next cycle." },
            ],
          },
          cycle: {
            roots: ["x"], rootRefs: { x: "A" },
            objs: [
              { id: "A", x: 280, y: 90, refs: ["B"] }, { id: "B", x: 430, y: 90, refs: [] },
              { id: "C", x: 280, y: 220, refs: ["D"] }, { id: "D", x: 430, y: 220, refs: ["C"] },
            ],
            steps: [
              { phase: "idle", marked: [], scanning: null, garbage: [], narr: "A → B. C and D point at each other in a <span class='em'>cycle</span>. Only root x reaches A. Reference counting would leak C and D forever — watch mark-sweep handle it." },
              { phase: "mark", marked: [], scanning: "A", garbage: [], narr: "<b>MARK PHASE.</b> Follow root x → A. Scanning A." },
              { phase: "mark", marked: ["A"], scanning: "B", garbage: [], narr: "A marked. Follow A → B. Scanning B." },
              { phase: "mark", marked: ["A", "B"], scanning: null, garbage: [], narr: "B marked. No outgoing pointers. Mark done — C and D were never visited; no root reaches them." },
              { phase: "sweep", marked: ["A", "B"], scanning: "C", garbage: [], narr: "<b>SWEEP PHASE.</b> C is unmarked → garbage. The cycle is irrelevant; only reachability matters." },
              { phase: "sweep", marked: ["A", "B"], scanning: "D", garbage: ["C"], narr: "D is unmarked → garbage. C freed." },
              { phase: "sweep", marked: ["A", "B"], scanning: null, garbage: ["C", "D"], narr: "C and D both freed. The cycle that defeats reference counting collapses easily here — <span class='em'>mark-sweep's biggest win.</span>" },
            ],
          },
          island: {
            roots: ["x"], rootRefs: { x: "A" },
            objs: [
              { id: "A", x: 270, y: 80, refs: ["B"] }, { id: "B", x: 420, y: 80, refs: [] },
              { id: "C", x: 270, y: 220, refs: ["D", "E"] }, { id: "D", x: 420, y: 195, refs: ["E"] }, { id: "E", x: 560, y: 240, refs: ["C"] },
            ],
            steps: [
              { phase: "idle", marked: [], scanning: null, garbage: [], narr: "A and B are reachable from x. C, D, E form a tightly connected <span class='em'>island</span> — all pointing at each other, but no root reaches them." },
              { phase: "mark", marked: [], scanning: "A", garbage: [], narr: "<b>MARK PHASE.</b> Follow root x → A." },
              { phase: "mark", marked: ["A"], scanning: "B", garbage: [], narr: "A marked. Follow A → B." },
              { phase: "mark", marked: ["A", "B"], scanning: null, garbage: [], narr: "B marked. No more pointers from this subgraph. The C/D/E island is never visited." },
              { phase: "sweep", marked: ["A", "B"], scanning: "C", garbage: [], narr: "<b>SWEEP PHASE.</b> C is unmarked → garbage." },
              { phase: "sweep", marked: ["A", "B"], scanning: "D", garbage: ["C"], narr: "D is unmarked → garbage." },
              { phase: "sweep", marked: ["A", "B"], scanning: "E", garbage: ["C", "D"], narr: "E is unmarked → garbage." },
              { phase: "sweep", marked: ["A", "B"], scanning: null, garbage: ["C", "D", "E"], narr: "The entire island collapses at once. No matter how intricate the internal structure, <span class='em'>unreachable means dead.</span>" },
            ],
          },
        };

        let cur = "basic", idx = 0, timer = null;
        const $ = (id) => document.getElementById(id);
        const W = 66, H = 44;

        function stateOf(step, id) {
          if (step.garbage.includes(id)) return "garbage";
          if (step.scanning === id) return "scanning";
          if (step.marked.includes(id)) return "marked";
          return "unmarked";
        }
        const STYLE = {
          unmarked: { fill: "rgba(94,159,246,0.06)", stroke: "#2d333d", text: "#9099a8", dash: "" },
          scanning: { fill: "rgba(240,181,104,0.16)", stroke: "#f0b568", text: "#f0b568", dash: "" },
          marked: { fill: "rgba(92,198,111,0.14)", stroke: "#5cc66f", text: "#7bd389", dash: "" },
          garbage: { fill: "rgba(240,104,104,0.13)", stroke: "#f06868", text: "#f3a0a0", dash: "4 3" },
        };

        function edge(layer, from, to, live) {
          const dx = to.x - from.x, dy = to.y - from.y, L = Math.hypot(dx, dy) || 1;
          const ux = dx / L, uy = dy / L;
          const sx = from.x + ux * 36, sy = from.y + uy * 26;
          const ex = to.x - ux * 38, ey = to.y - uy * 28;
          layer.appendChild(svg("line", { x1: sx, y1: sy, x2: ex, y2: ey, stroke: live ? "#5cc66f" : "#3a4150", "stroke-width": 1.5, "marker-end": live ? "url(#ms-arr-live)" : "url(#ms-arr)" }));
        }

        function render() {
          const scn = SCN[cur], step = scn.steps[idx];
          const objs = $("objs"), refs = $("refs"), roots = $("roots");
          [objs, refs, roots].forEach((g) => (g.innerHTML = ""));
          const pos = {}; scn.objs.forEach((o) => (pos[o.id] = { x: o.x, y: o.y }));

          scn.objs.forEach((o) => {
            o.refs.forEach((r) => { const live = step.marked.includes(o.id) && step.marked.includes(r); edge(refs, pos[o.id], pos[r], live); });
          });
          scn.roots.forEach((rt, i) => {
            const y = 70 + i * 80, tgt = scn.rootRefs[rt];
            roots.appendChild(svg("rect", { x: 38, y: y - 17, width: 80, height: 34, rx: 7, fill: "rgba(94,159,246,0.10)", stroke: "#5e9ff6", "stroke-width": 1.2 }));
            const t = svg("text", { x: 78, y: y + 5, "text-anchor": "middle", "font-size": 13, "font-weight": 600, fill: "#9cc4fb" }); t.textContent = "root " + rt; roots.appendChild(t);
            if (tgt && pos[tgt]) edge(refs, { x: 118, y }, pos[tgt], step.marked.includes(tgt));
          });
          scn.objs.forEach((o) => {
            const st = stateOf(step, o.id), s = STYLE[st], p = pos[o.id];
            if (st === "scanning") objs.appendChild(svg("rect", { x: p.x - W / 2 - 4, y: p.y - H / 2 - 4, width: W + 8, height: H + 8, rx: 12, fill: "none", stroke: "#f0b568", "stroke-width": 1, opacity: 0.45 }));
            objs.appendChild(svg("rect", { x: p.x - W / 2, y: p.y - H / 2, width: W, height: H, rx: 9, fill: s.fill, stroke: s.stroke, "stroke-width": 1.6, "stroke-dasharray": s.dash }));
            const nm = svg("text", { x: p.x, y: p.y - 1, "text-anchor": "middle", "font-size": 15, "font-weight": 600, fill: s.text }); nm.textContent = o.id; objs.appendChild(nm);
            const tag = svg("text", { x: p.x, y: p.y + 14, "text-anchor": "middle", "font-size": 9, fill: s.text, "font-family": "var(--mono)", opacity: 0.7 });
            tag.textContent = st === "marked" ? "✓ alive" : st === "garbage" ? "freed" : st === "scanning" ? "scan…" : "—"; objs.appendChild(tag);
          });

          $("narration").innerHTML = step.narr;
          $("s-total").textContent = scn.objs.length;
          $("s-marked").textContent = step.marked.length;
          $("s-garbage").textContent = step.garbage.length;
          const ph = $("s-phase"); ph.textContent = step.phase;
          ph.style.color = step.phase === "mark" ? "#f0b568" : step.phase === "sweep" ? "#f06868" : "#9099a8";
          $("counter").textContent = `Step ${idx + 1} / ${scn.steps.length}`;
          $("prev").disabled = idx === 0;
          $("next").disabled = idx === scn.steps.length - 1;
        }

        function stopAuto() { if (timer) { clearInterval(timer); timer = null; $("auto").innerHTML = '<i class="ti ti-player-play"></i>Auto'; } }
        function go(n) { const max = SCN[cur].steps.length - 1; idx = Math.max(0, Math.min(max, n)); render(); if (idx === max) stopAuto(); }
        $("next").onclick = () => { stopAuto(); go(idx + 1); };
        $("prev").onclick = () => { stopAuto(); go(idx - 1); };
        $("restart").onclick = () => { stopAuto(); go(0); };
        $("auto").onclick = () => { if (timer) { stopAuto(); return; } if (idx === SCN[cur].steps.length - 1) idx = 0; $("auto").innerHTML = '<i class="ti ti-player-pause"></i>Pause'; timer = setInterval(() => go(idx + 1), 1150); };
        document.querySelectorAll(".tab").forEach((b) => b.addEventListener("click", () => { stopAuto(); document.querySelectorAll(".tab").forEach((x) => x.classList.remove("active")); b.classList.add("active"); cur = b.dataset.scn; idx = 0; render(); }));
        render();
      })();
    </script>
  </body>
</html>
